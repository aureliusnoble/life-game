    const tipOuter = Math.min(jawSpan, jawGap + (jawSpan - jawGap) * 0.55 + tipEat * 0.4);
    const tipInner = jawGap * 0.65 + tipEat;

    // --- Dark mouth interior (behind jaws) ---
    ctx.fillStyle = '#120202';
    ctx.beginPath();
    ctx.ellipse(hingeX + jawLen * 0.28, mouthY, jawLen * 0.38, jawGap * 1.3, 0, 0, Math.PI * 2);
    ctx.fill();

    // --- Upper jaw (thick half-disc) ---
    ctx.fillStyle = hsl(dc.h, dc.s, dc.l - 18);
    ctx.beginPath();
    ctx.moveTo(hingeX, mouthY - jawGap);
    ctx.lineTo(hingeX, mouthY - jawSpan);
    ctx.bezierCurveTo(
      hingeX + jawLen * 0.4, mouthY - jawSpan * 1.05,
      hingeX + jawLen * 0.75, mouthY - tipOuter * 1.15,
      hingeX + jawLen, mouthY - tipOuter
    );
    ctx.quadraticCurveTo(
      hingeX + jawLen + 2.5 * ms, mouthY - (tipOuter + tipInner) / 2,
      hingeX + jawLen, mouthY - tipInner
    );
    ctx.bezierCurveTo(
      hingeX + jawLen * 0.65, mouthY - jawGap * 0.9,
      hingeX + jawLen * 0.3, mouthY - jawGap * 0.95,
      hingeX, mouthY - jawGap
    );
    ctx.fill();
    ctx.strokeStyle = hsl(dc.h, dc.s, dc.l - 30);
    ctx.lineWidth = 1.2 * ms;
    ctx.stroke();

    // Upper jaw highlight
    ctx.fillStyle = hsla(dc.h, dc.s, dc.l + 8, 0.15);
    ctx.beginPath();
    ctx.ellipse(
      hingeX + jawLen * 0.35, mouthY - jawSpan * 0.7,
      jawLen * 0.22, (jawSpan - jawGap) * 0.15,
      -0.2, 0, Math.PI * 2
    );
    ctx.fill();

    // --- Lower jaw (thick half-disc) ---
    ctx.fillStyle = hsl(dc.h, dc.s, dc.l - 22);
    ctx.beginPath();
    ctx.moveTo(hingeX, mouthY + jawGap);
    ctx.lineTo(hingeX, mouthY + jawSpan);
    ctx.bezierCurveTo(
      hingeX + jawLen * 0.4, mouthY + jawSpan * 1.05,
      hingeX + jawLen * 0.75, mouthY + tipOuter * 1.15,
      hingeX + jawLen, mouthY + tipOuter
    );
    ctx.quadraticCurveTo(
      hingeX + jawLen + 2.5 * ms, mouthY + (tipOuter + tipInner) / 2,
      hingeX + jawLen, mouthY + tipInner
    );
    ctx.bezierCurveTo(
      hingeX + jawLen * 0.65, mouthY + jawGap * 0.9,
      hingeX + jawLen * 0.3, mouthY + jawGap * 0.95,
      hingeX, mouthY + jawGap
    );
    ctx.fill();
    ctx.strokeStyle = hsl(dc.h, dc.s, dc.l - 30);
    ctx.lineWidth = 1.2 * ms;
    ctx.stroke();

    // --- Teeth along inner jaw edges ---
    const teethCount = Math.min(7, 3 + Math.floor(s.strength * 0.8));
    ctx.fillStyle = '#f5f0e0';
    for (let i = 0; i < teethCount; i++) {
      const frac = (i + 0.5) / teethCount;
      const tx = hingeX + frac * jawLen * 0.88;
      const toothR = (2.2 + s.strength * 0.4) * ms;
      // Interpolate inner edge position at this fraction
      const innerY = jawGap * (1 - frac) + tipInner * frac;
      // Upper teeth (protrude downward into gap)
      ctx.beginPath();
      ctx.arc(tx, mouthY - innerY + toothR * 0.4, toothR, 0, Math.PI * 2);
      ctx.fill();
      // Lower teeth (protrude upward into gap)
      ctx.beginPath();
      ctx.arc(tx, mouthY + innerY - toothR * 0.4, toothR, 0, Math.PI * 2);
      ctx.fill();
    }

  } else {
    // ===== CIRCLE MOUTH =====
    // Friendly "O" shape at the body edge. Visible idle pulsing.
    const breathe = 1 + Math.sin(t * 2.5) * 0.1 + openFactor * 0.4;
    const innerPulse = 1 + Math.sin(t * 3.5) * 0.08;
    const lipRx = mw * 0.55 * breathe;
    const lipRy = mh * 0.6 * breathe;

    // Outer lip ring
    ctx.fillStyle = hsl(dc.h, dc.s, dc.l - 8);
    ctx.beginPath();
    ctx.ellipse(mouthX, mouthY, lipRx, lipRy, 0, 0, Math.PI * 2);
    ctx.fill();

    // Lip outline
    ctx.strokeStyle = hsl(dc.h, dc.s, dc.l - 18);
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.ellipse(mouthX, mouthY, lipRx, lipRy, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Inner dark opening — pulsates independently
    ctx.fillStyle = '#1a0808';
    ctx.beginPath();
    ctx.ellipse(mouthX, mouthY, lipRx * 0.5 * innerPulse, lipRy * 0.55 * innerPulse, 0, 0, Math.PI * 2);
    ctx.fill();

    // Lip highlight (top arc)
    ctx.fillStyle = hsla(dc.h, dc.s, dc.l + 15, 0.25);
    ctx.beginPath();
    ctx.ellipse(mouthX, mouthY - lipRy * 0.35, lipRx * 0.45, lipRy * 0.18, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

// ============================================================
// TRAIT DRAWING FUNCTIONS
// ============================================================

function drawEcholocation(ctx, s, g, t) {
  // Expanding rings from body center, cyan-ish
  const spawnInterval = 0.6;
  const maxRadius = g.rx * 3;
  const ringLife = 2.0;

  // Spawn new ring
  if (time > 0 && Math.floor(time / spawnInterval) > Math.floor((time - 0.016) / spawnInterval)) {
    echoRings.push({ birth: time, r: g.rx * 0.9 });
  }

  ctx.save();
  const alive = [];
  for (const ring of echoRings) {
    const age = time - ring.birth;
    if (age > ringLife) continue;
    alive.push(ring);

    const progress = age / ringLife;
    const r = ring.r + progress * (maxRadius - ring.r);
    const alpha = (1 - progress * progress) * 0.35;

    ctx.strokeStyle = hsla(185, 60, 65, alpha);
    ctx.lineWidth = Math.max(0.5, 1.5 * (1 - progress));

    // Becomes dashed at far distances
    if (progress > 0.5) {
      const dashLen = 4 + progress * 8;
      ctx.setLineDash([dashLen, dashLen * 0.8]);
    } else {
      ctx.setLineDash([]);
    }

    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  echoRings = alive;
  ctx.restore();
}

function drawCamouflage(ctx, s, g, t, bodyPoints) {
  // Bold mottled camouflage pattern across the body
  const dc = dietHSL(s.diet, s.metabolism);
  const breathe = Math.sin(t * 1.5) * 0.015;
  const alphaBase = 0.3 + stateEnergy * 0.4; // visible but energy-dependent

  ctx.save();
  traceBodyPath(ctx, bodyPoints);
  ctx.clip();

  // Layer 1: Large irregular blotches — alternating diet and accent hue
  for (let i = 0; i < 10; i++) {
    const seed1 = Math.sin(i * 5.31 + 0.8) * 0.5 + 0.5;
    const seed2 = Math.cos(i * 9.17 + 0.4) * 0.5 + 0.5;
    const seed3 = Math.sin(i * 3.41 + 1.5) * 0.5 + 0.5;

    const sx = (seed1 - 0.5) * g.rx * 1.8 + Math.sin(t * 0.5 + i) * g.rx * breathe;
    const sy = (seed2 - 0.5) * g.ry * 1.8 + Math.cos(t * 0.4 + i) * g.ry * breathe;
    const spotRx = (8 + seed3 * 14) * Math.max(0.5, g.rx / 45);
    const spotRy = spotRx * (0.5 + seed3 * 0.5);

    // Alternate: even blotches use accent hue, odd use diet hue (darker)
    const patchH = i % 2 === 0 ? accentMix(dc.h, 0.6) : dc.h;
    const patchL = dc.l - 15 - seed3 * 8;

    ctx.fillStyle = hsla(patchH, dc.s - 3, patchL, alphaBase * 0.7);
    ctx.beginPath();
    ctx.ellipse(sx, sy, spotRx, spotRy, i * 0.8 + t * 0.02, 0, Math.PI * 2);
    ctx.fill();
  }

  // Layer 2: Medium spots — stronger accent hue presence
  for (let i = 0; i < 14; i++) {
    const seed1 = Math.sin(i * 7.71 + 2.1) * 0.5 + 0.5;
    const seed2 = Math.cos(i * 4.33 + 1.7) * 0.5 + 0.5;
    const seed3 = Math.sin(i * 6.19 + 0.3) * 0.5 + 0.5;

    const sx = (seed1 - 0.5) * g.rx * 1.7 + Math.sin(t * 0.6 + i * 0.7) * g.rx * breathe;
    const sy = (seed2 - 0.5) * g.ry * 1.7 + Math.cos(t * 0.5 + i * 0.5) * g.ry * breathe;
    const spotR = (4 + seed3 * 8) * Math.max(0.5, g.rx / 45);

    let spotH, spotL;
    if (i % 3 === 0) {
      // Full accent hue spots
      spotH = accentHue;
      spotL = dc.l + 5;
    } else if (i % 3 === 1) {
      // Heavy accent blend
      spotH = accentMix(dc.h, 0.7);
      spotL = dc.l - 10;
    } else {
      // Diet hue variation (lighter)
      spotH = dc.h + 10;
      spotL = dc.l + 12;
    }

    ctx.fillStyle = hsla(spotH, dc.s + 5, spotL, alphaBase * 0.6);
    ctx.beginPath();
    ctx.arc(sx, sy, spotR, 0, Math.PI * 2);
    ctx.fill();
  }

  // Layer 3: Fine speckles — accent-tinted
  for (let i = 0; i < 20; i++) {
    const sx = (Math.sin(i * 3.91 + 0.7) - 0.5) * g.rx * 1.6;
    const sy = (Math.cos(i * 5.47 + 1.1) - 0.5) * g.ry * 1.6;
    const sr = (1.5 + Math.sin(i * 2.3) * 1) * Math.max(0.5, g.rx / 50);
    const speckH = i % 3 === 0 ? accentHue : accentMix(dc.h, 0.4);
    const speckL = i % 2 === 0 ? dc.l + 15 : dc.l - 12;

    ctx.fillStyle = hsla(speckH, dc.s, speckL, alphaBase * 0.45);
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawVenomGlands(ctx, s, g, t) {
  const venomH = 280; // purple
  const lineScale = Math.max(0.5, g.rx / 50);

  // Compute mouth edge X
  let edgeRx = g.rx;
  if (s.strength > 0.5) {
    const hm = (s.strength - 0.5) * 0.12;
    const d = 0.87;
    const bump = 2 * Math.exp(-d * d / (2 * 0.4 * 0.4));
    edgeRx *= 1 + bump * hm;
  }

  const ms = g.mouthScale;

  // === Purple mandibles: curved fang-like appendages flanking the mouth ===
  const mandibleAngle = 30 * Math.PI / 180;
  const mandibleLen = (12 + s.strength * 8) * ms;

  // Idle open/close animation
  const mandibleSpread = Math.sin(t * 1.8) * 0.15 + (currentAnimState === 'attacking' ? Math.sin(t * 8) * 0.3 : 0);

  for (const sign of [-1, 1]) {
    const baseAngle = sign * (mandibleAngle + mandibleSpread);
    const bx = Math.cos(baseAngle) * edgeRx * 0.92;
    const by = Math.sin(baseAngle) * g.ry * 0.75;

    // Mandible: thick curved fang extending forward
    const tipX = bx + mandibleLen * 0.8;
    const tipY = by + sign * (mandibleLen * 0.4 + mandibleSpread * mandibleLen * 0.6);
    const ctrlX = bx + mandibleLen * 0.5;
    const ctrlY = by + sign * (mandibleLen * 0.7 + mandibleSpread * mandibleLen * 0.4);

    // Mandible body (thick tapered stroke)
    ctx.save();
    ctx.lineCap = 'round';

    // Outer glow
    ctx.strokeStyle = hsla(venomH, 60, 55, 0.3);
    ctx.lineWidth = (5 + s.strength * 2) * ms;
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.quadraticCurveTo(ctrlX, ctrlY, tipX, tipY);
    ctx.stroke();

    // Main mandible
    ctx.strokeStyle = hsla(venomH, 70, 40, 0.85);
    ctx.lineWidth = (3 + s.strength * 1.5) * ms;
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.quadraticCurveTo(ctrlX, ctrlY, tipX, tipY);
    ctx.stroke();

    // Highlight edge
    ctx.strokeStyle = hsla(venomH - 10, 50, 65, 0.4);
    ctx.lineWidth = (1.5 + s.strength * 0.5) * ms;
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.quadraticCurveTo(ctrlX - 1, ctrlY - sign * 2, tipX, tipY);
    ctx.stroke();

    // Venom droplet at tip
    const dripPulse = 0.5 + Math.sin(t * 3 + sign * 2) * 0.5;
    const dripR = (2 + dripPulse * 1.5) * ms;
    const dGrad = ctx.createRadialGradient(tipX, tipY, 0, tipX, tipY, dripR * 2);
    dGrad.addColorStop(0, hsla(venomH, 75, 55, 0.7 * dripPulse));
    dGrad.addColorStop(0.5, hsla(venomH, 65, 50, 0.3 * dripPulse));
    dGrad.addColorStop(1, hsla(venomH, 55, 45, 0));
    ctx.fillStyle = dGrad;
    ctx.beginPath();
    ctx.arc(tipX, tipY + sign * 2, dripR * 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // Gland bulge at base
    const glandR = (4 + s.strength * 2) * ms;
    const glGrad = ctx.createRadialGradient(bx, by, 0, bx, by, glandR);
    glGrad.addColorStop(0, hsla(venomH, 65, 50, 0.5));
    glGrad.addColorStop(0.6, hsla(venomH, 55, 45, 0.25));
    glGrad.addColorStop(1, hsla(venomH, 50, 40, 0));
    ctx.fillStyle = glGrad;
    ctx.beginPath();
    ctx.arc(bx, by, glandR, 0, Math.PI * 2);
    ctx.fill();
  }

  // Ambient purple glow around mandible area
  const ambGlow = ctx.createRadialGradient(edgeRx * 0.7, 0, 0, edgeRx * 0.7, 0, mandibleLen * 2);
  ambGlow.addColorStop(0, hsla(venomH, 50, 50, 0.08));
  ambGlow.addColorStop(0.5, hsla(venomH, 40, 45, 0.04));
  ambGlow.addColorStop(1, hsla(venomH, 30, 40, 0));
  ctx.fillStyle = ambGlow;
  ctx.beginPath();
  ctx.arc(edgeRx * 0.7, 0, mandibleLen * 2, 0, Math.PI * 2);
  ctx.fill();

  // Drip particles from both mandible tips — faster rate, more particles
  const dripRate = 0.18;
  if (time > 0 && Math.floor(time / dripRate) > Math.floor((time - 0.016) / dripRate)) {
    for (const sign of [-1, 1]) {
      const baseAngle2 = sign * (mandibleAngle + mandibleSpread);
      const bx2 = Math.cos(baseAngle2) * edgeRx * 0.92;
      const by2 = Math.sin(baseAngle2) * g.ry * 0.75;
      const tipX2 = bx2 + mandibleLen * 0.8;
      const tipY2 = by2 + sign * (mandibleLen * 0.4 + mandibleSpread * mandibleLen * 0.6);
      venomDrips.push({
        x: tipX2,
        y: tipY2 + sign * 2,
        vx: 1 + Math.random() * 4,
        vy: sign * 4 + 6 + Math.random() * 8,
        birth: time,
        size: (1.5 + Math.random() * 2) * lineScale,
      });
    }
  }

  const alive = [];
  for (const d of venomDrips) {
    const age = time - d.birth;
    if (age > 1.5) continue;
    alive.push(d);

    const progress = age / 1.5;
    const px = d.x + d.vx * age * (1 - progress * 0.4);
    const py = d.y + d.vy * age;
    const alpha = (1 - progress) * 0.65;

    // Glowing purple drip
    const dGrad = ctx.createRadialGradient(px, py, 0, px, py, d.size * 1.5);
    dGrad.addColorStop(0, hsla(venomH, 75, 58, alpha));
    dGrad.addColorStop(0.6, hsla(venomH, 65, 50, alpha * 0.4));
    dGrad.addColorStop(1, hsla(venomH, 55, 45, 0));
    ctx.fillStyle = dGrad;
    ctx.beginPath();
    ctx.arc(px, py, d.size * 1.5 * (1 - progress * 0.2), 0, Math.PI * 2);
    ctx.fill();
  }
  venomDrips = alive;
}

function drawFatDeposits(ctx, s, g, t, bodyPoints) {
  // Visible fat deposits — warm yellow-cream coloration across flanks and belly
  const fatH = 48, fatS = 55, fatL = 72;
  const fillLevel = stateFatFill; // 0 = depleted, 1 = full
  const baseOpacity = 0.25 + fillLevel * 0.45;

  ctx.save();
  traceBodyPath(ctx, bodyPoints);
  ctx.clip();

  // Large belly/flank fat patches — cream colored, obviously visible
  const patchCount = 3 + Math.floor(fillLevel * 5);
  for (let i = 0; i < patchCount; i++) {
    const side = (i % 2 === 0) ? 1 : -1;
    // Fat concentrates on sides and belly
    const fx = (Math.sin(i * 3.7 + 0.5) * 0.4 - 0.15) * g.rx;
    const fy = side * (0.2 + Math.sin(i * 2.1 + 0.3) * 0.3) * g.ry;

    const patchRx = (8 + fillLevel * 16) * Math.max(0.5, g.rx / 42);
    const patchRy = patchRx * (0.6 + fillLevel * 0.2);
    const patchAngle = side * 0.3 + i * 0.4;

    // Warm fat gradient
    const grad = ctx.createRadialGradient(fx, fy, 0, fx, fy, patchRx);
    grad.addColorStop(0, hsla(fatH, fatS, fatL, baseOpacity));
    grad.addColorStop(0.4, hsla(fatH, fatS - 5, fatL - 3, baseOpacity * 0.7));
    grad.addColorStop(0.7, hsla(fatH - 5, fatS - 10, fatL - 8, baseOpacity * 0.35));
    grad.addColorStop(1, hsla(fatH - 10, fatS - 15, fatL - 12, 0));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(fx, fy, patchRx, patchRy, patchAngle, 0, Math.PI * 2);
    ctx.fill();
  }

  // Central belly band at high fill levels
  if (fillLevel > 0.4) {
    const bandOpacity = (fillLevel - 0.4) * 0.5;
    const bandH = g.ry * (0.3 + fillLevel * 0.3);
    const bandGrad = ctx.createLinearGradient(0, -bandH, 0, bandH);
    bandGrad.addColorStop(0, hsla(fatH, fatS - 10, fatL, 0));
    bandGrad.addColorStop(0.3, hsla(fatH, fatS, fatL, bandOpacity));
    bandGrad.addColorStop(0.5, hsla(fatH, fatS + 5, fatL + 5, bandOpacity * 1.2));
    bandGrad.addColorStop(0.7, hsla(fatH, fatS, fatL, bandOpacity));
    bandGrad.addColorStop(1, hsla(fatH, fatS - 10, fatL, 0));
    ctx.fillStyle = bandGrad;
    ctx.beginPath();
    ctx.ellipse(0, 0, g.rx * 0.85, bandH, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawArmorPlating(ctx, s, g, t) {
  // Spikes/spines protruding from the body
  const dc = dietHSL(s.diet, s.metabolism);
  const isFront = traitArmorSide === 'front';
  const spikeCount = 4 + Math.floor(s.defense * 0.8);

  // Angular range for spike placement
  let startDeg, endDeg;
  if (isFront) {
    startDeg = -70; endDeg = 70;
  } else {
    startDeg = 110; endDeg = 250;
  }
  const startRad = startDeg * Math.PI / 180;
  const endRad = endDeg * Math.PI / 180;

  // Spike colors: sharp, bone-like with accent mix
  const spikeH = accentMix(dc.h, 0.25);
  const spikeSat = Math.max(15, dc.s - 25);
  const spikeLight = dc.l + 10;
  const ms = Math.max(0.5, g.rx / 45);

  // Exclusion zones: mouth (angle near 0) and tail (angle near PI)
  const mouthZone = 35 * Math.PI / 180;  // ±35° from front
  const tailZone = 25 * Math.PI / 180;   // ±25° from back

  ctx.save();
  for (let i = 0; i < spikeCount; i++) {
    const frac = spikeCount === 1 ? 0.5 : i / (spikeCount - 1);
    const angle = startRad + frac * (endRad - startRad);

    // Normalize angle to [-PI, PI]
    let normAngle = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
    if (normAngle > Math.PI) normAngle -= Math.PI * 2;

    // Skip if in mouth zone (near 0) or tail zone (near ±PI)
    if (Math.abs(normAngle) < mouthZone) continue;
    if (Math.abs(normAngle) > Math.PI - tailZone) continue;

    // Body edge at this angle (ellipse)
    const bodyEdgeR = Math.sqrt(
      1 / ((Math.cos(angle) / g.rx) ** 2 + (Math.sin(angle) / g.ry) ** 2)
    );

    const baseX = Math.cos(angle) * bodyEdgeR;
    const baseY = Math.sin(angle) * bodyEdgeR;

    // Spike length varies: longer in center, shorter at edges
    const centerFrac = 1 - Math.abs(frac - 0.5) * 1.4; // 1 at center, ~0.3 at edges
    const spikeLen = (10 + s.defense * 5 + centerFrac * 8) * ms;
    const spikeWidth = (3 + s.defense * 1) * ms;

    // Spike points outward from body
    const tipX = baseX + Math.cos(angle) * spikeLen;
    const tipY = baseY + Math.sin(angle) * spikeLen;

    // Perpendicular for base width
    const perpX = -Math.sin(angle) * spikeWidth;
    const perpY = Math.cos(angle) * spikeWidth;

    // Draw spike: triangular with curved edges
    ctx.beginPath();
    ctx.moveTo(baseX + perpX, baseY + perpY);
    ctx.quadraticCurveTo(
      baseX + Math.cos(angle) * spikeLen * 0.6 + perpX * 0.3,
      baseY + Math.sin(angle) * spikeLen * 0.6 + perpY * 0.3,
      tipX, tipY
    );
    ctx.quadraticCurveTo(
      baseX + Math.cos(angle) * spikeLen * 0.6 - perpX * 0.3,
      baseY + Math.sin(angle) * spikeLen * 0.6 - perpY * 0.3,
      baseX - perpX, baseY - perpY
    );
    ctx.closePath();

    // Gradient fill: lighter base, darker tip (bone-like)
    const grad = ctx.createLinearGradient(baseX, baseY, tipX, tipY);
    grad.addColorStop(0, hsla(spikeH, spikeSat, spikeLight, 0.8));
    grad.addColorStop(0.6, hsla(spikeH, spikeSat + 5, spikeLight - 10, 0.7));
    grad.addColorStop(1, hsla(spikeH, spikeSat + 10, spikeLight - 20, 0.6));
    ctx.fillStyle = grad;
    ctx.fill();

    // Edge outline
    ctx.strokeStyle = hsla(spikeH, spikeSat, spikeLight - 25, 0.4);
    ctx.lineWidth = 0.8 * ms;
    ctx.stroke();

    // Highlight line along one side
    ctx.beginPath();
    ctx.moveTo(baseX + perpX * 0.6, baseY + perpY * 0.6);
    ctx.quadraticCurveTo(
      baseX + Math.cos(angle) * spikeLen * 0.5 + perpX * 0.15,
      baseY + Math.sin(angle) * spikeLen * 0.5 + perpY * 0.15,
      tipX, tipY
    );
    ctx.strokeStyle = hsla(spikeH, spikeSat - 10, spikeLight + 15, 0.3);
    ctx.lineWidth = 0.6 * ms;
    ctx.stroke();
  }
  ctx.restore();
}

function drawSexIndicator(ctx, s, g, bodyPoints) {
  const dc = dietHSL(s.diet, s.metabolism);

  if (traitSex === 'male') {
    // Male: thicker blue-shifted outline + angular crest marks
    const strokeH = dc.h + 40; // strong blue-shift
    const strokeS = Math.min(100, dc.s + 15);

    // Bold tinted outline
    ctx.save();
    traceBodyPath(ctx, bodyPoints);
    ctx.strokeStyle = hsla(strokeH, strokeS, dc.l - 5, 0.55);
    ctx.lineWidth = g.membraneW + 2.5;
    ctx.stroke();
    ctx.restore();

    // Angular crest marks along back (dorsal ridge)
    ctx.save();
    const crestCount = 4;
    const ms = Math.max(0.5, g.rx / 45);
    for (let i = 0; i < crestCount; i++) {
      const frac = (i + 0.5) / crestCount;
      const angle = Math.PI * (0.6 + frac * 0.8); // top-back region
      const bx = Math.cos(angle) * g.rx * 1.02;
      const by = Math.sin(angle) * g.ry * 1.02;
      const crestH = (4 + (1 - Math.abs(frac - 0.5) * 2) * 5) * ms;

      ctx.fillStyle = hsla(strokeH, strokeS, dc.l + 5, 0.5);
      ctx.beginPath();
      ctx.moveTo(bx - Math.sin(angle) * crestH * 0.3, by + Math.cos(angle) * crestH * 0.3);
      ctx.lineTo(bx + Math.cos(angle) * crestH, by + Math.sin(angle) * crestH);
      ctx.lineTo(bx + Math.sin(angle) * crestH * 0.3, by - Math.cos(angle) * crestH * 0.3);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

  } else {
    // Female: warm-shifted outline + soft markings
    const strokeH = dc.h - 25; // warm shift toward amber/pink
    const strokeS = Math.min(100, dc.s + 10);

    // Warm tinted outline
    ctx.save();
    traceBodyPath(ctx, bodyPoints);
    ctx.strokeStyle = hsla(strokeH, strokeS, dc.l, 0.5);
    ctx.lineWidth = g.membraneW + 2;
    ctx.stroke();
    ctx.restore();

    // Soft rounded spots (display markings)
    ctx.save();
    traceBodyPath(ctx, bodyPoints);
    ctx.clip();
    const spotCount = 3;
    for (let i = 0; i < spotCount; i++) {
      const angle = Math.PI * (1.2 + i * 0.25); // along back-top
      const sx = Math.cos(angle) * g.rx * 0.65;
      const sy = Math.sin(angle) * g.ry * 0.65;
      const spotR = (4 + Math.sin(i * 2.7) * 2) * Math.max(0.5, g.rx / 45);

      const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, spotR);
      grad.addColorStop(0, hsla(strokeH, strokeS + 10, dc.l + 12, 0.35));
      grad.addColorStop(0.6, hsla(strokeH, strokeS, dc.l + 5, 0.15));
      grad.addColorStop(1, hsla(strokeH, strokeS - 5, dc.l, 0));
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(sx, sy, spotR, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawSporeDispersal(ctx, s, g, t) {
  // Replaces egg laying when spore trait is active
  // Continuous cycle: body contracts, burst of spores from rear, drift and fade
  const cycleDuration = 2.5;
  const cycleRaw = animStateTime % cycleDuration;
  const bodyScale = Math.max(0.5, g.rx / 50);

  // Phase 1 (0 - 0.8s): Body contracts and green glow builds
  if (cycleRaw < 0.8) {
    const buildP = cycleRaw / 0.8;
    // Growing green glow
    const glowA = buildP * 0.25;
    const grad = ctx.createRadialGradient(0, 0, g.rx * 0.3, 0, 0, g.rx * 1.4);
    grad.addColorStop(0, hsla(85, 70, 65, glowA * 0.6));
    grad.addColorStop(0.5, hsla(95, 60, 55, glowA));
    grad.addColorStop(1, hsla(100, 50, 50, 0));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, g.rx * 1.4, g.ry * 1.4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Pulsing body tint
    ctx.fillStyle = hsla(90, 60, 60, glowA * 0.3);
    ctx.beginPath();
    ctx.ellipse(0, 0, g.rx, g.ry, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Phase 2 (0.8 - 1.3s): BURST — spawn many spores every frame
  if (cycleRaw >= 0.8 && cycleRaw < 1.3) {
    const burstP = (cycleRaw - 0.8) / 0.5;
    // Spawn 3-4 spores per frame during burst
    const count = burstP < 0.3 ? 4 : 2;
    for (let i = 0; i < count; i++) {
      const angle = Math.PI + (Math.random() - 0.5) * 1.4; // rear hemisphere spread
      const speed = 30 + Math.random() * 50;
      sporeParticles.push({
        x: Math.cos(angle) * g.rx * 0.7,
        y: Math.sin(angle) * g.ry * 0.7,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed + (Math.random() - 0.5) * 15,
        birth: time,
        size: (3 + Math.random() * 3) * bodyScale,
        hue: 75 + Math.random() * 40, // yellow-green variety
      });
    }

    // Bright burst flash
    const flashA = Math.sin(burstP * Math.PI) * 0.45;
    ctx.fillStyle = hsla(85, 70, 75, flashA);
    ctx.beginPath();
    ctx.ellipse(0, 0, g.rx * 1.5, g.ry * 1.5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Inner bright flash
    ctx.fillStyle = hsla(70, 80, 85, flashA * 0.6);
    ctx.beginPath();
    ctx.ellipse(0, 0, g.rx * 0.8, g.ry * 0.8, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw and update spore particles
  const alive = [];
  for (const p of sporeParticles) {
    const age = time - p.birth;
    if (age > 3.0) continue;
    alive.push(p);

    const progress = age / 3.0;
    // Spores drift outward and slow down
    const drift = age * (1 - progress * 0.5);
    const px = p.x + p.vx * drift;
    const py = p.y + p.vy * drift;
    const alpha = (1 - progress * progress) * 0.85; // fade curve
    const pr = p.size * (1 + progress * 0.5);

    // Outer glow halo
    const haloR = pr * 3;
    const haloGrad = ctx.createRadialGradient(px, py, 0, px, py, haloR);
    haloGrad.addColorStop(0, hsla(p.hue, 70, 65, alpha * 0.5));
    haloGrad.addColorStop(0.4, hsla(p.hue + 10, 55, 55, alpha * 0.25));
    haloGrad.addColorStop(1, hsla(p.hue + 15, 40, 45, 0));
    ctx.fillStyle = haloGrad;
    ctx.beginPath();
    ctx.arc(px, py, haloR, 0, Math.PI * 2);
    ctx.fill();

    // Solid spore body
    const bodyGrad = ctx.createRadialGradient(px, py, 0, px, py, pr);
    bodyGrad.addColorStop(0, hsla(p.hue - 10, 80, 80, alpha));
    bodyGrad.addColorStop(0.6, hsla(p.hue, 70, 55, alpha * 0.9));
    bodyGrad.addColorStop(1, hsla(p.hue + 10, 60, 45, alpha * 0.5));
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.arc(px, py, pr, 0, Math.PI * 2);
    ctx.fill();

    // Bright core highlight
    ctx.fillStyle = hsla(65, 85, 90, alpha * 0.7);
    ctx.beginPath();
    ctx.arc(px - pr * 0.2, py - pr * 0.2, pr * 0.35, 0, Math.PI * 2);
    ctx.fill();
  }
  sporeParticles = alive;
}

// ============================================================
// ANIMATION OVERLAY FUNCTIONS
// ============================================================

function drawAnimationOverlays(ctx, s, g, t, animState) {
  if (animState === 'eating') {
    drawEatingOverlay(ctx, s, g, t);
  } else if (animState === 'pheromone') {
    drawPheromoneOverlay(ctx, s, g, t);
  } else if (animState === 'fleeing') {
    drawFleeingOverlay(ctx, s, g, t);
  } else if (animState === 'burrowing') {
    drawBurrowingOverlay(ctx, s, g, t);
  } else if (animState === 'laying_eggs') {
    if (traitSporeDispersal) {
      drawSporeDispersal(ctx, s, g, t);
    } else {
      drawLayingEggsOverlay(ctx, s, g, t);
    }
  } else if (animState === 'attacking') {
    drawAttackingOverlay(ctx, s, g, t);
  } else if (animState === 'damaged') {
    drawDamagedOverlay(ctx, s, g, t);
  } else if (animState === 'dying') {
    drawDyingOverlay(ctx, s, g, t);
  } else if (animState === 'hatching') {
    drawHatchingOverlay(ctx, s, g, t);
  } else if (animState === 'poisoned') {
    drawPoisonedOverlay(ctx, s, g, t);
  } else if (animState === 'surfacing') {
    drawSurfacingOverlay(ctx, s, g, t);
  }
}

function drawEatingOverlay(ctx, s, g, t) {
  const cycle = (animStateTime % 2.5) / 2.5;
  const dc = dietHSL(s.diet, s.metabolism);

  // Food particle approaches from front-right then gets pulled in
  if (cycle < 0.4) {
    const progress = cycle / 0.4;
    const startX = g.rx + 60;
    const endX = g.rx * 0.9;
    const fx = startX + (endX - startX) * easeInQuad(progress);
    const fy = Math.sin(progress * Math.PI * 2) * 5;

    // Food dot
    ctx.fillStyle = s.diet > 0.5 ? '#c06040' : '#60c040';
    ctx.beginPath();
    ctx.arc(fx, fy, 3 + (1 - progress) * 2, 0, Math.PI * 2);
    ctx.fill();

    // Glow around food
    ctx.fillStyle = s.diet > 0.5 ? 'rgba(192,96,64,0.2)' : 'rgba(96,192,64,0.2)';
    ctx.beginPath();
    ctx.arc(fx, fy, 6 + (1 - progress) * 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Body pulse on swallow
  if (cycle > 0.4 && cycle < 0.6) {
    const swallowProgress = (cycle - 0.4) / 0.2;
    const pulseAlpha = Math.sin(swallowProgress * Math.PI) * 0.15;
    ctx.fillStyle = hsla(dc.h, dc.s, dc.l + 20, pulseAlpha);
    ctx.beginPath();
    ctx.ellipse(0, 0, g.rx * 1.1, g.ry * 1.1, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPheromoneOverlay(ctx, s, g, t) {
  const dc = dietHSL(s.diet, s.metabolism);
  const lineScale = Math.max(0.5, g.rx / 50);
  // Pheromone hue by type: red(0), green(1), blue(2)
  const PHERO_HUES = [0, 130, 220];
  const pheroH = PHERO_HUES[pheromoneType] || 0;

  const emitRate = 0.10; // faster emission
  const cloudLife = 2.8;
  const particleLife = 2.0;

  // --- Emit cloud puffs + scattered particles ---
  if (animStateTime > 0 && Math.floor(animStateTime / emitRate) > Math.floor((animStateTime - 0.016) / emitRate)) {
    const angle = Math.random() * Math.PI * 2;
    const bodyR = Math.sqrt((Math.cos(angle) * g.rx) ** 2 + (Math.sin(angle) * g.ry) ** 2);

    // One cloud puff
    pheromoneParticles.push({
      type: 'cloud',
      angle, startR: bodyR,
      birth: animStateTime,
      hue: pheroH + (Math.random() - 0.5) * 20,
    });

    // 3 small particles scattered around the puff
    for (let i = 0; i < 3; i++) {
      pheromoneParticles.push({
        type: 'dot',
        angle: angle + (Math.random() - 0.5) * 1.2,
        startR: bodyR * (0.85 + Math.random() * 0.3),
        birth: animStateTime,
        hue: pheroH + (Math.random() - 0.5) * 35,
        speed: 0.7 + Math.random() * 0.7,
      });
    }
  }

  // --- Draw & clean ---
  const alive = [];
  for (const p of pheromoneParticles) {
    const age = animStateTime - p.birth;
    const life = p.type === 'cloud' ? cloudLife : particleLife;
    if (age > life) continue;
    alive.push(p);

    const progress = age / life;

    if (p.type === 'cloud') {
      // Expanding soft cloud puff
      const r = p.startR + progress * 65;
      const px = Math.cos(p.angle) * r;
      const py = Math.sin(p.angle) * r;
      const cloudR = (8 + progress * 30) * lineScale;
      const alpha = (1 - progress * progress) * 0.32; // quadratic fade

      const grad = ctx.createRadialGradient(px, py, 0, px, py, cloudR);
      grad.addColorStop(0, hsla(p.hue, 50, 68, alpha));
      grad.addColorStop(0.5, hsla(p.hue, 40, 62, alpha * 0.45));
      grad.addColorStop(1, hsla(p.hue, 30, 55, 0));
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(px, py, cloudR, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Bright particle dot
      const r = p.startR + progress * 50 * p.speed;
      const px = Math.cos(p.angle) * r;
      const py = Math.sin(p.angle) * r;
      const alpha = (1 - progress) * 0.7;
      const dotR = (1.5 + progress * 1.2) * lineScale;

      ctx.fillStyle = hsla(p.hue, 70, 78, alpha);
      ctx.beginPath();
      ctx.arc(px, py, dotR, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  pheromoneParticles = alive;

  // --- Body glow (smooth, continuous) ---
  const glowI = 0.12 + Math.sin(animStateTime * 2.5) * 0.06;
  const grad = ctx.createRadialGradient(0, 0, g.rx * 0.4, 0, 0, g.rx * 1.4);
  grad.addColorStop(0, hsla(pheroH, 55, 70, glowI));
  grad.addColorStop(0.6, hsla(pheroH, 45, 65, glowI * 0.35));
  grad.addColorStop(1, hsla(pheroH, 35, 60, 0));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(0, 0, g.rx * 1.4, g.ry * 1.4, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawFleeingOverlay(ctx, s, g, t) {
  // Bubble trail behind (left side)
  const emitRate = 0.1;
  if (animStateTime > 0 && Math.floor(animStateTime / emitRate) > Math.floor((animStateTime - 0.016) / emitRate)) {
    fleeingBubbles.push({
      x: -g.rx - 5 - Math.random() * 10,
      y: (Math.random() - 0.5) * g.ry * 0.8,
      birth: animStateTime,
      size: 2 + Math.random() * 3,
    });
  }

  const alive = [];
  for (const b of fleeingBubbles) {
    const age = animStateTime - b.birth;
    if (age > 1.5) continue;
    alive.push(b);

    const progress = age / 1.5;
    const bx = b.x - progress * 20;
    const by = b.y - progress * 15;
    const alpha = (1 - progress) * 0.3;

    ctx.strokeStyle = `rgba(180, 220, 255, ${alpha})`;
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.arc(bx, by, b.size * (1 + progress * 0.5), 0, Math.PI * 2);
    ctx.stroke();
  }
  fleeingBubbles = alive;
}


// Draw burrowing effect ON TOP of organism
function drawBurrowingOverlay(ctx, s, g, t) {
  const bp = Math.min(1, animStateTime / 0.5); // 0→1 over 0.5s
  if (bp <= 0) return;

  const biome = BIOME_COLORS[currentBiome] || BIOME_COLORS.grassland;
  const bodyR = Math.max(g.rx, g.ry);

  // Dirt particles: only during dig-in phase (first 0.8s)
  const digPhase = animStateTime < 0.8;
  const emitRate = 0.05;
  if (digPhase && animStateTime > 0.05 && Math.floor(animStateTime / emitRate) > Math.floor((animStateTime - 0.016) / emitRate)) {
    const angle = Math.random() * Math.PI * 2;
    const startR = bodyR * 0.8 + Math.random() * bodyR * 0.3;
    burrowDirtParticles.push({
      x: Math.cos(angle) * startR,
      y: Math.sin(angle) * startR,
      vx: Math.cos(angle) * (10 + Math.random() * 18),
      vy: Math.sin(angle) * (10 + Math.random() * 18),
      birth: animStateTime,
      size: (1.5 + Math.random() * 2) * Math.max(0.5, bodyR / 50),
      color: Math.random() > 0.5 ? biome.particle : biome.bg2,
    });
  }

  const alive = [];
  for (const p of burrowDirtParticles) {
    const age = animStateTime - p.birth;
    if (age > 1.0) continue;
    alive.push(p);

    const progress = age / 1.0;
    const px = p.x + p.vx * age * (1 - progress * 0.6);
    const py = p.y + p.vy * age * (1 - progress * 0.6);
    const alpha = (1 - progress) * (1 - progress) * 0.5;
    const size = p.size * (1 - progress * 0.5);

    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(px, py, size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  burrowDirtParticles = alive;
}

function drawEgg(ctx, s, g, t, ex, ey, eggRx, eggRy, alpha) {
  const dc = dietHSL(s.diet, s.metabolism);

  ctx.save();
  ctx.translate(ex, ey);
  ctx.globalAlpha = alpha;

  // --- Inner glow (metabolism drives intensity) ---
  const glowR = Math.max(eggRx, eggRy);
  const glowAlpha = 0.15 + s.metabolism * 0.08;
  const innerGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, glowR * 0.8);
  innerGlow.addColorStop(0, hsla(dc.h, dc.s, dc.l + 20, glowAlpha));
  innerGlow.addColorStop(1, hsla(dc.h, dc.s, dc.l, 0));
  ctx.fillStyle = innerGlow;
  ctx.beginPath();
  ctx.ellipse(0, 0, eggRx, eggRy, 0, 0, Math.PI * 2);
  ctx.fill();

  // --- Egg body fill (diet-coloured, lighter than parent) ---
  const eggGrad = ctx.createRadialGradient(-eggRx * 0.2, -eggRy * 0.2, 0, 0, 0, glowR);
  eggGrad.addColorStop(0, hsla(dc.h, dc.s - 5, dc.l + 18, 0.75));
  eggGrad.addColorStop(0.7, hsla(dc.h, dc.s - 10, dc.l + 10, 0.65));
  eggGrad.addColorStop(1, hsla(dc.h, dc.s, dc.l, 0.55));
  ctx.fillStyle = eggGrad;
  ctx.beginPath();
  ctx.ellipse(0, 0, eggRx, eggRy, 0, 0, Math.PI * 2);
  ctx.fill();

  // --- Speckles (defense drives count and darkness) ---
  const speckCount = Math.floor(3 + s.defense * 3);
  const speckDark = Math.min(25, s.defense * 8);
  for (let i = 0; i < speckCount; i++) {
    // Deterministic positions based on index (stable per frame)
    const sa = (i / speckCount) * Math.PI * 2 + i * 1.7;
    const sr = (0.25 + ((Math.sin(i * 3.7) + 1) * 0.5) * 0.5) * glowR;
    const sx = Math.cos(sa) * sr * (eggRx / glowR);
    const sy = Math.sin(sa) * sr * (eggRy / glowR);
    const spR = (1 + Math.sin(i * 2.3) * 0.6) * Math.max(0.5, glowR / 15);

    ctx.fillStyle = hsla(dc.h, dc.s + 5, dc.l - speckDark, 0.4 + s.defense * 0.06);
    ctx.beginPath();
    ctx.arc(sx, sy, spR, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- Tiny eye dots (view radius > 4) ---
  if (s.viewRadius > 4) {
    const dotR = Math.max(1, glowR * 0.08);
    const dotSpread = eggRy * 0.25;
    const dotX = eggRx * 0.25;
    const irisC = irisColor(s.diet);
    // Two tiny eye hints
    for (const yOff of [-dotSpread, dotSpread]) {
      ctx.fillStyle = '#fafaf2';
      ctx.beginPath();
      ctx.arc(dotX, yOff, dotR * 1.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = hsl(irisC.h, irisC.s, irisC.l);
      ctx.beginPath();
      ctx.arc(dotX, yOff, dotR * 0.7, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // --- Translucent membrane shell ---
  const memW = Math.max(1, glowR * 0.08 + s.defense * 0.3);
  ctx.strokeStyle = hsla(dc.h, 20, 82, 0.5);
  ctx.lineWidth = memW;
  ctx.beginPath();
  ctx.ellipse(0, 0, eggRx, eggRy, 0, 0, Math.PI * 2);
  ctx.stroke();

  // --- Highlight (top-left specular) ---
  ctx.fillStyle = `rgba(255, 255, 255, 0.3)`;
  ctx.beginPath();
  ctx.ellipse(-eggRx * 0.25, -eggRy * 0.3, eggRx * 0.25, eggRy * 0.2, -0.3, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawLayingEggsOverlay(ctx, s, g, t) {
  const cycleDuration = 4.0;
  const cycle = (animStateTime % cycleDuration) / cycleDuration;
  const eggRx = g.baseR * 0.28;
  const eggRy = g.baseR * 0.22;

  if (cycle < 0.15) {
    // Stretching — handled by body distortion
  } else if (cycle > 0.15 && cycle < 0.5) {
    // Bud forming at back — egg grows from body
    const p = (cycle - 0.15) / 0.35;
    const budRx = eggRx * p;
    const budRy = eggRy * p;
    const budX = -g.rx - budRx * 0.5;
    drawEgg(ctx, s, g, t, budX, 0, budRx, budRy, 0.5 + p * 0.5);
  } else if (cycle > 0.5 && cycle < 0.7) {
    // Detaching — egg separates from body
    const p = (cycle - 0.5) / 0.2;
    const detachDist = p * g.rx * 0.5;
    const ex = -g.rx - eggRx * 0.5 - detachDist;
    const ey = p * g.ry * 0.12;
    drawEgg(ctx, s, g, t, ex, ey, eggRx, eggRy, 1.0);
  } else if (cycle > 0.7 && cycle < 0.85) {
    // Egg drifting away
    const p = (cycle - 0.7) / 0.15;
    const baseX = -g.rx - eggRx * 0.5 - g.rx * 0.5;
    const ex = baseX - p * g.rx * 0.35;
    const ey = g.ry * 0.12 + p * g.ry * 0.08;
    drawEgg(ctx, s, g, t, ex, ey, eggRx, eggRy, 1.0 - p * 0.4);
  }
  // 0.85–1.0: pause/recovery
}

function easeInQuad(t) { return t * t; }

// ============================================================
// NEW ANIMATION OVERLAYS
// ============================================================

function drawAttackingOverlay(ctx, s, g, t) {
  const cycleDuration = 1.5;
  const cycle = (animStateTime % cycleDuration) / cycleDuration;

  // Jaw opens wide during lunge (0–0.13)
  // Contact flash at peak (0.13–0.18)
  if (cycle > 0.1 && cycle < 0.2) {
    const flashP = Math.sin((cycle - 0.1) / 0.1 * Math.PI);

    // Starburst at front edge
    const flashX = g.rx * 1.15;
    const flashR = g.rx * 0.3;
    const grad = ctx.createRadialGradient(flashX, 0, 0, flashX, 0, flashR);
    grad.addColorStop(0, hsla(0, 90, 95, flashP * 0.8));
    grad.addColorStop(0.3, hsla(10, 80, 70, flashP * 0.4));
    grad.addColorStop(1, hsla(0, 70, 50, 0));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(flashX, 0, flashR, 0, Math.PI * 2);
    ctx.fill();

    // Spawn blood particles at contact
    if (attackParticles.length < 10 && cycle < 0.15) {
      for (let i = 0; i < 8; i++) {
        const angle = (Math.random() - 0.5) * Math.PI * 0.8;
        attackParticles.push({
          x: flashX,
          y: 0,
          vx: Math.cos(angle) * (15 + Math.random() * 20),
          vy: Math.sin(angle) * (15 + Math.random() * 20),
          birth: time,
          size: (1.5 + Math.random() * 2) * Math.max(0.5, g.rx / 50),
          elongation: 0.5 + Math.random() * 0.5,
        });
      }
    }
  }

  // Draw blood particles (deep red, slightly elongated)
  const alive = [];
  for (const p of attackParticles) {
    const age = time - p.birth;
    if (age > 1.0) continue;
    alive.push(p);

    const progress = age / 1.0;
    const px = p.x + p.vx * age * (1 - progress * 0.5);
    const py = p.y + p.vy * age + age * age * 15; // slight gravity
    const alpha = (1 - progress) * 0.7;
    const pr = p.size * (1 - progress * 0.3);

    // Deep red with lighter center
    const grad = ctx.createRadialGradient(px, py, 0, px, py, pr);
    grad.addColorStop(0, hsla(0, 80, 45, alpha));
    grad.addColorStop(0.5, hsla(0, 80, 35, alpha * 0.7));
    grad.addColorStop(1, hsla(0, 70, 25, 0));
    ctx.fillStyle = grad;
    ctx.beginPath();
    // Slightly elongated blobs
    ctx.ellipse(px, py, pr, pr * p.elongation, Math.atan2(p.vy, p.vx), 0, Math.PI * 2);
    ctx.fill();

    // Tiny wet sheen
    ctx.fillStyle = hsla(0, 20, 90, alpha * 0.3);
    ctx.beginPath();
    ctx.arc(px - pr * 0.2, py - pr * 0.2, pr * 0.2, 0, Math.PI * 2);
    ctx.fill();
  }
  attackParticles = alive;
}

function drawDamagedOverlay(ctx, s, g, t) {
  const cycleDuration = 1.2;
  const cycle = (animStateTime % cycleDuration) / cycleDuration;

  // Bold red flash overlay — larger and more intense
  if (cycle < 0.2) {
    const flashAlpha = Math.sin(cycle / 0.2 * Math.PI) * 0.45;
    ctx.fillStyle = hsla(0, 80, 50, flashAlpha);
    ctx.beginPath();
    ctx.ellipse(0, 0, g.rx * 1.25, g.ry * 1.25, 0, 0, Math.PI * 2);
    ctx.fill();

    // White inner flash for impact
    const whiteAlpha = Math.sin(cycle / 0.2 * Math.PI) * 0.2;
    ctx.fillStyle = `rgba(255,255,255,${whiteAlpha})`;
    ctx.beginPath();
    ctx.ellipse(0, 0, g.rx * 0.8, g.ry * 0.8, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Thick red ring pulse
  if (cycle > 0.05 && cycle < 0.3) {
    const ringP = (cycle - 0.05) / 0.25;
    const ringR = g.rx * (1.0 + ringP * 0.6);
    const ringAlpha = (1 - ringP) * 0.35;
    ctx.strokeStyle = hsla(0, 70, 55, ringAlpha);
    ctx.lineWidth = 3 + (1 - ringP) * 4;
    ctx.beginPath();
    ctx.ellipse(0, 0, ringR, ringR * (g.ry / g.rx), 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Bigger burst of body-colored + red particles from edge
  if (cycle < 0.08 && damageParticles.length < 16) {
    const dc = dietHSL(s.diet, s.metabolism);
    for (let i = 0; i < 14; i++) {
      const angle = Math.random() * Math.PI * 2;
      const bodyR = Math.sqrt((Math.cos(angle) * g.rx) ** 2 + (Math.sin(angle) * g.ry) ** 2);
      const isRed = i < 4; // some red particles mixed in
      damageParticles.push({
        x: Math.cos(angle) * bodyR * 0.95,
        y: Math.sin(angle) * bodyR * 0.95,
        vx: Math.cos(angle) * (18 + Math.random() * 28),
        vy: Math.sin(angle) * (18 + Math.random() * 28),
        birth: time,
        size: (2 + Math.random() * 3) * Math.max(0.6, g.rx / 45),
        h: isRed ? 0 : dc.h,
        s: isRed ? 70 : dc.s,
        l: isRed ? 45 : dc.l,
      });
    }
  }

  const alive = [];
  for (const p of damageParticles) {
    const age = time - p.birth;
    if (age > 1.0) continue;
    alive.push(p);

    const progress = age / 1.0;
    const px = p.x + p.vx * age * (1 - progress * 0.5);
    const py = p.y + p.vy * age * (1 - progress * 0.5);
    const alpha = (1 - progress) * 0.75;
    const pr = p.size * (1 - progress * 0.3);

    ctx.fillStyle = hsla(p.h, p.s, p.l, alpha);
    ctx.beginPath();
    ctx.arc(px, py, pr, 0, Math.PI * 2);
    ctx.fill();
  }
  damageParticles = alive;
}

// Standalone pellet renderer — used by dying overlay, gallery, and spawner
function drawSinglePellet(ctx, x, y, size, elongation, rotation, type, alpha, dc) {
  // type: 'meat' | 'plant' | 'body' | 'armor'
  if (alpha <= 0.01) return;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);

  // Color by type
  let h, s, l;
  if (type === 'meat') { h = 5; s = 60; l = 40; }
  else if (type === 'plant') { h = 120; s = 55; l = 45; }
  else if (type === 'body') { h = dc.h; s = dc.s; l = dc.l; }
  else { h = dc.h; s = Math.max(15, dc.s - 20); l = dc.l + 10; } // armor

  // Radial gradient: lighter center → darker edge
  const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, size);
  grad.addColorStop(0, hsla(h, s, l + 8, alpha));
  grad.addColorStop(0.6, hsla(h, s, l, alpha * 0.8));
  grad.addColorStop(1, hsla(h, Math.max(10, s - 10), l - 8, alpha * 0.4));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(0, 0, size, size * elongation, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wet sheen highlight (small white dot offset top-left)
  ctx.fillStyle = hsla(0, 10, 92, alpha * 0.2);
  ctx.beginPath();
  ctx.arc(-size * 0.2, -size * 0.2, size * 0.18, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawDyingOverlay(ctx, s, g, t) {
  // Called AFTER body is hidden (animStateTime >= 0.3)
  // POP burst: pellets colored/shaped by organism characteristics

  const dc = dietHSL(s.diet, s.metabolism);

  // Spawn pellets once, with properties derived from organism
  if (dyingFragments.length === 0 && animStateTime >= 0.3) {
    // More pellets for larger organisms
    const baseCount = 15 + Math.floor(s.size * 5);
    const count = Math.min(30, baseCount + Math.floor(Math.random() * 8));

    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
      // Larger organisms scatter further
      const speed = (15 + Math.random() * 30) * Math.max(0.6, Math.sqrt(s.size));

      // Pellet type depends on diet
      // Herbivores: green plant-like pellets
      // Carnivores: red-brown meat pellets
      // Omnivores: mix of both
      let pelletType;
      if (s.diet < 0.3) {
        pelletType = 'plant';
      } else if (s.diet > 0.7) {
        pelletType = 'meat';
      } else {
        pelletType = Math.random() > 0.5 ? 'plant' : 'meat';
      }

      // Some body-colored fragments mixed in (shell/body pieces)
      if (i < count * 0.3) pelletType = 'body';

      // Armored organisms shed armor fragments
      if (traitArmorPlating && i < 3) pelletType = 'armor';

      dyingFragments.push({
        x: 0, y: 0,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        birth: time,
        size: (2.5 + Math.random() * 3.5) * Math.max(0.5, g.rx / 50),
        rot: Math.random() * Math.PI * 2,
        type: pelletType,
        elongation: 0.6 + Math.random() * 0.4,
      });
    }
  }

  // Draw pellets
  for (const p of dyingFragments) {
    const age = time - p.birth;
    const progress = Math.min(1, age / 2.5);
    const px = p.x + p.vx * age * (1 - progress * 0.7);
    const py = p.y + p.vy * age * (1 - progress * 0.7) + age * age * 8;
    const alpha = (1 - progress) * 0.8;
    const pr = p.size * (1 - progress * 0.2);

    drawSinglePellet(ctx, px, py, pr, p.elongation, p.rot + age * 0.5, p.type, alpha, dc);
  }
}

function drawHatchingOverlay(ctx, s, g, t, matScale) {
  const eggRx = g.baseR * 0.4;
  const eggRy = g.baseR * 0.32;

  if (animStateTime < 1.0) {
    // Phase 1: wobbling egg
    const wobble = Math.sin(animStateTime * 8) * (3 + animStateTime * 5);
    ctx.save();
    ctx.rotate(wobble * Math.PI / 180);
    drawEgg(ctx, s, g, t, 0, 0, eggRx, eggRy, 1.0);
    ctx.restore();

  } else if (animStateTime < 2.0) {
    // Phase 2: cracking egg with intensifying wobble
    const wobble = Math.sin(animStateTime * 12) * (8 + (animStateTime - 1.0) * 12);
    const crackP = (animStateTime - 1.0) / 1.0;

    ctx.save();
    ctx.rotate(wobble * Math.PI / 180);
    drawEgg(ctx, s, g, t, 0, 0, eggRx, eggRy, 1.0);

    // Crack lines
    const dc = dietHSL(s.diet, s.metabolism);
    const crackCount = Math.floor(2 + crackP * 4);
    ctx.strokeStyle = hsla(dc.h, dc.s - 20, dc.l - 25, 0.6);
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    for (let i = 0; i < crackCount; i++) {
      const startAngle = (i / crackCount) * Math.PI * 2 + 0.3;
      const sx = Math.cos(startAngle) * eggRx * 0.3;
      const sy = Math.sin(startAngle) * eggRy * 0.3;
      const len = (eggRx * 0.4 + eggRx * 0.3 * crackP);
      const ex = sx + Math.cos(startAngle + 0.3) * len;
      const ey = sy + Math.sin(startAngle + 0.3) * len;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      // Jagged line
      const mx = (sx + ex) / 2 + Math.sin(i * 3.1) * 4;
      const my = (sy + ey) / 2 + Math.cos(i * 2.7) * 4;
      ctx.lineTo(mx, my);
      ctx.lineTo(ex, ey);
      ctx.stroke();
    }
    ctx.restore();

  } else if (animStateTime < 2.5) {
    // Phase 3: shell fragments burst, baby fades in
    const burstP = (animStateTime - 2.0) / 0.5;

    // Shell fragments
    const dc = dietHSL(s.diet, s.metabolism);
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      const dist = burstP * (g.rx * 0.8 + i * 3);
      const fx = Math.cos(angle) * dist;
      const fy = Math.sin(angle) * dist;
      const fragR = (2 + Math.sin(i * 2.3) * 1.5) * Math.max(0.5, g.rx / 50);
      const alpha = (1 - burstP) * 0.6;

      ctx.fillStyle = hsla(dc.h, 20, 82, alpha);
      ctx.beginPath();
      ctx.ellipse(fx, fy, fragR, fragR * 0.6, angle, 0, Math.PI * 2);
      ctx.fill();
    }

    // Baby organism fading in at 30% scale
    ctx.save();
    ctx.globalAlpha = burstP;
    ctx.scale(0.3, 0.3);
    const babyPoints = buildBodyPath(g, s, t);
    drawBody(ctx, s, g, t, 'idle', babyPoints);
    // Simple eyes for baby
    const savedEyeR = g.eyeR;
    g.eyeR *= 1.4; // big baby eyes
    drawEyes(ctx, s, g, t, 'idle');
    g.eyeR = savedEyeR;
    drawMouth(ctx, s, g, t, 'idle');
    ctx.restore();

  } else {
    // Phase 4: Baby fully visible
    ctx.save();
    ctx.scale(0.3, 0.3);
    const babyPoints = buildBodyPath(g, s, t);
    drawBody(ctx, s, g, t, 'idle', babyPoints);
    const savedEyeR = g.eyeR;
    g.eyeR *= 1.4;
    drawEyes(ctx, s, g, t, 'idle');
    g.eyeR = savedEyeR;
    drawMouth(ctx, s, g, t, 'idle');
    ctx.restore();
  }
}

function drawPoisonedOverlay(ctx, s, g, t) {
  const poisonH = 280;
  const cycleDuration = 1.5;
  const cycle = (animStateTime % cycleDuration) / cycleDuration;

  // Strong purple FLASH over entire body — very obvious
  const flashPhase = Math.sin(cycle * Math.PI * 2);
  const tintAlpha = 0.15 + flashPhase * 0.2;
  ctx.fillStyle = hsla(poisonH, 80, 50, Math.max(0, tintAlpha));
  ctx.beginPath();
  ctx.ellipse(0, 0, g.rx * 1.05, g.ry * 1.05, 0, 0, Math.PI * 2);
  ctx.fill();

  // Secondary rapid flicker
  const flicker = Math.sin(animStateTime * 15) * 0.12;
  if (flicker > 0) {
    ctx.fillStyle = hsla(poisonH - 20, 90, 60, flicker);
    ctx.beginPath();
    ctx.ellipse(0, 0, g.rx, g.ry, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Large pulsing purple outer glow
  const glowPulse = 0.5 + Math.sin(cycle * Math.PI * 2) * 0.5;
  const glowA = 0.12 + glowPulse * 0.15;
  const glow = ctx.createRadialGradient(0, 0, g.rx * 0.5, 0, 0, g.rx * 1.8);
  glow.addColorStop(0, hsla(poisonH, 70, 55, glowA * 0.6));
  glow.addColorStop(0.4, hsla(poisonH, 65, 50, glowA));
  glow.addColorStop(0.7, hsla(poisonH, 55, 45, glowA * 0.4));
  glow.addColorStop(1, hsla(poisonH, 50, 40, 0));
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.ellipse(0, 0, g.rx * 1.8, g.ry * 1.8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Purple vein-like streaks across body
  ctx.save();
  ctx.globalAlpha = 0.2 + flashPhase * 0.15;
  ctx.strokeStyle = hsla(poisonH, 70, 45, 0.5);
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  for (let i = 0; i < 5; i++) {
    const a = i * 1.3 + 0.5;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * g.rx * 0.1, Math.sin(a) * g.ry * 0.1);
    ctx.quadraticCurveTo(
      Math.cos(a + 0.5) * g.rx * 0.5, Math.sin(a + 0.5) * g.ry * 0.5,
      Math.cos(a + 1) * g.rx * 0.85, Math.sin(a + 1) * g.ry * 0.85
    );
    ctx.stroke();
  }
  ctx.restore();

  // Heavy drip particles — more frequent, larger
  const dripRate = 0.12;
  if (time > 0 && Math.floor(time / dripRate) > Math.floor((time - 0.016) / dripRate)) {
    for (let i = 0; i < 2; i++) {
      const angle = Math.random() * Math.PI * 2;
      const bodyR = Math.sqrt((Math.cos(angle) * g.rx) ** 2 + (Math.sin(angle) * g.ry) ** 2);
      poisonParticles.push({
        x: Math.cos(angle) * bodyR * 0.9,
        y: Math.sin(angle) * bodyR * 0.9,
        vx: Math.cos(angle) * (3 + Math.random() * 8),
        vy: Math.sin(angle) * 3 + 8 + Math.random() * 10,
        birth: time,
        size: (2 + Math.random() * 2.5) * Math.max(0.5, g.rx / 50),
      });
    }
  }

  const alive = [];
  for (const p of poisonParticles) {
    const age = time - p.birth;
    if (age > 1.8) continue;
    alive.push(p);

    const progress = age / 1.8;
    const px = p.x + p.vx * age;
    const py = p.y + p.vy * age;
    const alpha = (1 - progress) * 0.65;

    // Glowing purple drip
    const dGrad = ctx.createRadialGradient(px, py, 0, px, py, p.size * 1.5);
    dGrad.addColorStop(0, hsla(poisonH, 75, 60, alpha));
    dGrad.addColorStop(0.5, hsla(poisonH, 65, 50, alpha * 0.5));
    dGrad.addColorStop(1, hsla(poisonH, 55, 45, 0));
    ctx.fillStyle = dGrad;
    ctx.beginPath();
    ctx.arc(px, py, p.size * 1.5 * (1 - progress * 0.2), 0, Math.PI * 2);
    ctx.fill();
  }
  poisonParticles = alive;
}

function drawSurfacingOverlay(ctx, s, g, t) {
  // Dirt particles spray outward during first 0.3s
  const biome = BIOME_COLORS[currentBiome] || BIOME_COLORS.grassland;
  const bodyR = Math.max(g.rx, g.ry);

  if (animStateTime < 0.3) {
    const emitRate = 0.04;
    if (animStateTime > 0.02 && Math.floor(animStateTime / emitRate) > Math.floor((animStateTime - 0.016) / emitRate)) {
      const angle = Math.random() * Math.PI * 2;
      const startR = bodyR * 0.6 + Math.random() * bodyR * 0.4;
      surfaceDirtParticles.push({
        x: Math.cos(angle) * startR,
        y: Math.sin(angle) * startR,
        vx: Math.cos(angle) * (12 + Math.random() * 20),
        vy: Math.sin(angle) * (12 + Math.random() * 20) - 5,
        birth: animStateTime,
        size: (1.5 + Math.random() * 2.5) * Math.max(0.5, bodyR / 50),
        color: Math.random() > 0.5 ? biome.particle : biome.bg2,
      });
    }
  }

  const alive = [];
  for (const p of surfaceDirtParticles) {
    const age = animStateTime - p.birth;
    if (age > 1.0) continue;
    alive.push(p);

    const progress = age / 1.0;
    const px = p.x + p.vx * age * (1 - progress * 0.6);
    const py = p.y + p.vy * age * (1 - progress * 0.6);
    const alpha = (1 - progress) * (1 - progress) * 0.5;

    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(px, py, p.size * (1 - progress * 0.4), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  surfaceDirtParticles = alive;
}

// ============================================================
// MAIN ORGANISM RENDERER
// ============================================================

function drawOrganism(ctx, s, t, animState, w, h) {
  const g = computeGeometry(s);
  g_cachedGeometry = g;

  const cx = w / 2;
  let cy = h / 2;

  // Burrowing: slight sink (subtle, iris does the main work)
  if (animState === 'burrowing') {
    const bp = Math.min(1, animStateTime / 0.5);
    cy += bp * g.ry * 0.06;
  }

  // Surfacing: rise from underground
  if (animState === 'surfacing') {
    const sp = Math.min(1, animStateTime / 0.5);
    cy += (1 - sp) * g.ry * 0.06;
  }

  // Laying eggs: horizontal stretch (not for spore dispersal)
  let stretchX = 1, stretchY = 1;
  if (animState === 'laying_eggs' && !traitSporeDispersal) {
    const cycle = (animStateTime % 4) / 4;
    if (cycle < 0.15) {
      const p = cycle / 0.15;
      stretchX = 1 + p * 0.1;
      stretchY = 1 - p * 0.05;
    } else if (cycle > 0.5 && cycle < 0.65) {
      const p = (cycle - 0.5) / 0.15;
      stretchX = 1.1 - p * 0.12;
      stretchY = 0.95 + p * 0.06;
    }
  }

  // Spore dispersal: body contraction before burst
  if (animState === 'laying_eggs' && traitSporeDispersal) {
    const cycle = (animStateTime % 3.0) / 3.0;
    if (cycle < 0.3) {
      const p = cycle / 0.3;
      stretchX = 1 - p * 0.15;
      stretchY = 1 - p * 0.15;
    } else if (cycle < 0.4) {
      const p = (cycle - 0.3) / 0.1;
      stretchX = 0.85 + p * 0.2;
      stretchY = 0.85 + p * 0.2;
    }
  }

  // Attacking: lunge forward
  let lungeOffset = 0;
  if (animState === 'attacking') {
    const cycle = (animStateTime % 1.5) / 1.5;
    if (cycle < 0.13) {
      lungeOffset = (cycle / 0.13) * g.rx * 0.15;
    } else if (cycle < 0.27) {
      lungeOffset = (1 - (cycle - 0.13) / 0.14) * g.rx * 0.15;
    }
  }

  // Damaged: bold body scale pulse + shake
  let damageScale = 1;
  let damageShake = 0;
  if (animState === 'damaged') {
    const cycle = (animStateTime % 1.2) / 1.2;
    if (cycle < 0.12) {
      damageScale = 1 - (cycle / 0.12) * 0.15;  // contract to 85%
      damageShake = Math.sin(cycle * 80) * 4;     // rapid shake
    } else if (cycle < 0.3) {
      damageScale = 0.85 + ((cycle - 0.12) / 0.18) * 0.25; // rebound to 110%
      damageShake = Math.sin(cycle * 50) * 2;
    } else if (cycle < 0.55) {
      damageScale = 1.10 - ((cycle - 0.3) / 0.25) * 0.10;  // settle to 100%
    }
  }

  // Dying: wobble + desaturate + alpha, then hide body
  let dyingAlpha = 1;
  let dyingWobble = 0;
  if (animState === 'dying') {
    if (animStateTime < 0.3) {
      dyingAlpha = 1 - animStateTime * 1.5;
      dyingWobble = Math.sin(animStateTime * 60) * 5 * (1 - animStateTime / 0.3);
    } else {
      // After pop: skip body rendering entirely
      ctx.save();
      ctx.translate(cx, cy);
      drawDyingOverlay(ctx, s, g, t);
      ctx.restore();
      return;
    }
  }

  // Hatching: skip normal body, draw egg/baby instead
  if (animState === 'hatching') {
    ctx.save();
    ctx.translate(cx, cy);

    // Maturity scale for baby
    const matScale = 0.3 + stateMaturity * 0.7;

    drawHatchingOverlay(ctx, s, g, t, matScale);
    ctx.restore();
    return;
  }

  // Maturity: overall size scale
  const maturityScale = 0.3 + stateMaturity * 0.7;

  ctx.save();
  ctx.translate(cx + lungeOffset + dyingWobble + damageShake, cy);
  ctx.scale(maturityScale, maturityScale);
  if (stretchX !== 1 || stretchY !== 1) ctx.scale(stretchX, stretchY);
  if (damageScale !== 1) ctx.scale(damageScale, damageScale);
  if (animState === 'burrowing') {
    const burrowProgress = Math.min(1, animStateTime / 0.5);
    ctx.globalAlpha = 1 - burrowProgress * 0.75;
  }
  if (animState === 'surfacing') {
    const sp = Math.min(1, animStateTime / 0.5);
    ctx.globalAlpha = 0.25 + sp * 0.75;
  }
  if (dyingAlpha < 1) {
    ctx.globalAlpha = Math.max(0.05, dyingAlpha);
  }

  const bodyPoints = buildBodyPath(g, s, t);

  // Rendering pipeline (back to front):
  drawVisionCone(ctx, s, g);
  drawSensorRing(ctx, s, g);
  if (traitEcholocation) drawEcholocation(ctx, s, g, t);
  drawTails(ctx, s, g, t, animState);
  drawCilia(ctx, s, g, t, animState);
  drawShell(ctx, s, g);
  drawBody(ctx, s, g, t, animState, bodyPoints);
  if (traitCamouflage) drawCamouflage(ctx, s, g, t, bodyPoints);
  if (traitFatReserves) drawFatDeposits(ctx, s, g, t, bodyPoints);
  if (traitArmorPlating) drawArmorPlating(ctx, s, g, t);
  if (traitVenom) drawVenomGlands(ctx, s, g, t);
  if (showInternals) drawInternals(ctx, s, g, t, animState, bodyPoints);

  // Eyes: juveniles have proportionally bigger eyes
  const savedEyeR = g.eyeR;
  if (stateMaturity < 1) {
    g.eyeR *= 1 + (1 - stateMaturity) * 0.4;
  }
  // Health < 0.3: bloodshot eyes
  drawEyes(ctx, s, g, t, animState);
  if (stateHealth < 0.3) {
    drawBloodshotEyes(ctx, s, g);
  }
  g.eyeR = savedEyeR;

  drawMouth(ctx, s, g, t, animState);
  if (traitSexualRepro) drawSexIndicator(ctx, s, g, bodyPoints);
  drawAnimationOverlays(ctx, s, g, t, animState);

  ctx.restore();
}

function drawBloodshotEyes(ctx, s, g) {
  // Faint red veins on eye sclera at low health
  const halfViewArc = g.viewAngleRad / 2;
  const maxSpread = Math.PI * 0.42;
  const effectiveHalfArc = Math.min(halfViewArc, maxSpread);
  const eyeAngles = [];
  if (g.eyeCount === 1) {
    eyeAngles.push(0);
  } else {
    for (let i = 0; i < g.eyeCount; i++) {
      eyeAngles.push(-effectiveHalfArc + (2 * effectiveHalfArc) * i / (g.eyeCount - 1));
    }
  }
  const deadZone = Math.max(0.35, Math.atan2(g.mouthH * 1.2 + 4, g.rx * 0.6));
  const er = g.eyeR;

  for (const angle of eyeAngles) {
    const proximity = Math.min(1, Math.abs(angle) / deadZone);
    const eyeDepth = 0.5 + proximity * 0.18;
    const ex = Math.cos(angle) * g.rx * eyeDepth;
    const ey = Math.sin(angle) * g.ry * eyeDepth;

    ctx.save();
    ctx.translate(ex, ey);
    const veinAlpha = (0.3 - stateHealth) * 1.5;
    ctx.strokeStyle = hsla(0, 70, 45, veinAlpha);
    ctx.lineWidth = 0.5;
    for (let v = 0; v < 3; v++) {
      const va = v * 2.1 + 0.3;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(va) * er * 0.8, Math.sin(va) * er * 0.7);
      ctx.stroke();
    }
    ctx.restore();
  }
}
