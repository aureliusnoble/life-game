function drawPartMouth(ctx, t, diet, str) {
  const cw = 100, ch = 100;
  ctx.clearRect(0, 0, cw, ch);
  ctx.fillStyle = '#0d1520';
  ctx.fillRect(0, 0, cw, ch);

  ctx.save();
  ctx.translate(25, 50);

  const mw = 8 + str * 6;
  const mh = 5 + str * 4;
  const dc = dietHSL(diet, 1.0);

  if (diet < 0.25) {
    // Filter cilia — waving tentacles
    const count = Math.min(8, 5 + Math.floor(str));
    const totalSpread = mh * 3.5;
    ctx.lineCap = 'round';
    for (let i = 0; i < count; i++) {
      const frac = count === 1 ? 0 : (i / (count - 1)) - 0.5;
      const baseY = frac * totalSpread;
      const wave = Math.sin(t * 3 + i * 0.9) * (5 + 3);
      const pulse = 1 + Math.sin(t * 2 + i * 0.5) * 0.1;
      const len = (10 + str * 6) * pulse;
      const alpha = 0.5 + 0.2 * Math.sin(t * 1.5 + i);
      ctx.strokeStyle = hsla(dc.h, dc.s, dc.l + 5, alpha);
      ctx.lineWidth = 2.4 - Math.abs(frac) * 1.2;
      ctx.beginPath();
      ctx.moveTo(0, baseY);
      ctx.bezierCurveTo(len * 0.3, baseY + wave * 0.6, len * 0.7, baseY + wave, len, baseY + wave * 0.3);
      ctx.stroke();
      ctx.fillStyle = hsla(dc.h, dc.s, dc.l + 20, 0.55);
      ctx.beginPath();
      ctx.arc(len, baseY + wave * 0.3, 2.2, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (diet >= 0.65) {
    // Pac-Man Chomper — thick half-disc jaws, gallery version
    const jawLen = mw + 2;
    const jawSpan = mh * 0.85 + 4;
    const baseGap = 2 + mh * 0.1;
    const snapFactor = Math.max(0, Math.sin(t * 2));
    const idleGap = Math.sin(t * 1.8) * mh * 0.04;
    // Hinge barely moves; snap opens at the tip
    const jawGap = Math.max(1.5, baseGap + idleGap + snapFactor * jawSpan * 0.04);
    const tipEat = snapFactor * jawSpan * 0.45;
    const tipOuter = Math.min(jawSpan, jawGap + (jawSpan - jawGap) * 0.55 + tipEat * 0.4);
    const tipInner = jawGap * 0.65 + tipEat;

    // Interior
    ctx.fillStyle = '#120202';
    ctx.beginPath();
    ctx.ellipse(jawLen * 0.28, 0, jawLen * 0.38, jawGap * 1.3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Upper jaw
    ctx.fillStyle = hsl(dc.h, dc.s, dc.l - 18);
    ctx.beginPath();
    ctx.moveTo(0, -jawGap);
    ctx.lineTo(0, -jawSpan);
    ctx.bezierCurveTo(jawLen * 0.4, -jawSpan * 1.05, jawLen * 0.75, -tipOuter * 1.15, jawLen, -tipOuter);
    ctx.quadraticCurveTo(jawLen + 2.5, -(tipOuter + tipInner) / 2, jawLen, -tipInner);
    ctx.bezierCurveTo(jawLen * 0.65, -jawGap * 0.9, jawLen * 0.3, -jawGap * 0.95, 0, -jawGap);
    ctx.fill();
    ctx.strokeStyle = hsl(dc.h, dc.s, dc.l - 30);
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // Lower jaw
    ctx.fillStyle = hsl(dc.h, dc.s, dc.l - 22);
    ctx.beginPath();
    ctx.moveTo(0, jawGap);
    ctx.lineTo(0, jawSpan);
    ctx.bezierCurveTo(jawLen * 0.4, jawSpan * 1.05, jawLen * 0.75, tipOuter * 1.15, jawLen, tipOuter);
    ctx.quadraticCurveTo(jawLen + 2.5, (tipOuter + tipInner) / 2, jawLen, tipInner);
    ctx.bezierCurveTo(jawLen * 0.65, jawGap * 0.9, jawLen * 0.3, jawGap * 0.95, 0, jawGap);
    ctx.fill();
    ctx.strokeStyle = hsl(dc.h, dc.s, dc.l - 30);
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // Teeth
    const tc = Math.min(7, 3 + Math.floor(str * 0.8));
    ctx.fillStyle = '#f5f0e0';
    for (let i = 0; i < tc; i++) {
      const frac = (i + 0.5) / tc;
      const tx = frac * jawLen * 0.88;
      const toothR = 2.2 + str * 0.4;
      const innerY = jawGap * (1 - frac) + tipInner * frac;
      ctx.beginPath();
      ctx.arc(tx, -innerY + toothR * 0.4, toothR, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(tx, innerY - toothR * 0.4, toothR, 0, Math.PI * 2);
      ctx.fill();
    }
  } else {
    // Circle mouth — pulsing "O"
    const breathe = 1 + Math.sin(t * 2.5) * 0.1;
    const innerPulse = 1 + Math.sin(t * 3.5) * 0.08;
    const lipRx = mw * 0.55 * breathe;
    const lipRy = mh * 0.6 * breathe;
    ctx.fillStyle = hsl(dc.h, dc.s, dc.l - 8);
    ctx.beginPath();
    ctx.ellipse(0, 0, lipRx, lipRy, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = hsl(dc.h, dc.s, dc.l - 18);
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.ellipse(0, 0, lipRx, lipRy, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = '#1a0808';
    ctx.beginPath();
    ctx.ellipse(0, 0, lipRx * 0.5 * innerPulse, lipRy * 0.55 * innerPulse, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = hsla(dc.h, dc.s, dc.l + 15, 0.25);
    ctx.beginPath();
    ctx.ellipse(0, -lipRy * 0.35, lipRx * 0.45, lipRy * 0.18, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawPartEye(ctx, t, vr, diet) {
  const cw = 100, ch = 100;
  ctx.clearRect(0, 0, cw, ch);
  ctx.fillStyle = '#0d1520';
  ctx.fillRect(0, 0, cw, ch);

  ctx.save();
  ctx.translate(50, 50);

  const d = diet;
  const er = Math.min(12, 5 + vr * 1.5);
  const detail = Math.max(0, vr - 5);
  const irisC = irisColor(d);

  // Sclera: rotated 90°, smooth diet transition
  const scRx = er * (1.15 + d * 0.05);
  const scRy = er * (1.1 - d * 0.2);

  const outlineW = Math.max(0.8, er * 0.08 + detail * 0.3);

  // Glow ring for high VR
  if (detail > 2) {
    ctx.strokeStyle = hsla(irisC.h, irisC.s + 10, irisC.l + 25, Math.min(0.25, (detail - 2) * 0.08));
    ctx.lineWidth = 2 + detail * 0.5;
    ctx.beginPath();
    ctx.ellipse(0, 0, scRx + 3, scRy + 3, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Sclera
  ctx.fillStyle = '#f0f0e8';
  ctx.strokeStyle = `rgba(${Math.round(34 + (1-d)*34)}, ${Math.round(34 + (1-d)*34)}, ${Math.round(34 + (1-d)*34)}, 1)`;
  ctx.lineWidth = outlineW;
  ctx.beginPath();
  ctx.ellipse(0, 0, scRx, scRy, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Iris
  const trackX = Math.sin(t * 0.5) * er * 0.1;
  const trackY = Math.cos(t * 0.7) * er * 0.06;
  const irisR = er * (0.55 - d * 0.08);
  ctx.fillStyle = hsl(irisC.h, irisC.s + detail * 2, irisC.l + detail * 3);
  ctx.beginPath();
  ctx.arc(trackX, trackY, irisR, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = hsl(irisC.h, irisC.s + 10, irisC.l - 15);
  ctx.lineWidth = 0.6 + detail * 0.1;
  ctx.stroke();

  // Inner iris ring
  if (detail > 1) {
    ctx.strokeStyle = hsla(irisC.h, irisC.s + 5, irisC.l + 8, 0.3);
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.arc(trackX, trackY, irisR * 0.72, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Pupil: superellipse — rectangle (herb) → round (omni) → slit (carn)
  ctx.fillStyle = '#0a0a0a';
  const pupilRx = er * (0.10 + d * 0.28);
  const pupilRy = er * (0.38 - d * 0.28);
  const sn = 2 + Math.max(0, 1 - d * 2) * 3;
  ctx.beginPath();
  const pSteps = 36;
  for (let pi = 0; pi <= pSteps; pi++) {
    const theta = (pi / pSteps) * Math.PI * 2;
    const ct = Math.cos(theta), st = Math.sin(theta);
    const px = trackX + pupilRx * Math.sign(ct) * Math.pow(Math.abs(ct), 2 / sn);
    const py = trackY + pupilRy * Math.sign(st) * Math.pow(Math.abs(st), 2 / sn);
    if (pi === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();

  // Highlights
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(er * 0.18, -er * 0.22, er * 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(-er * 0.12, er * 0.15, er * 0.1, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawPartTails(ctx, t, speed) {
  const cw = 100, ch = 100;
  ctx.clearRect(0, 0, cw, ch);
  ctx.fillStyle = '#0d1520';
  ctx.fillRect(0, 0, cw, ch);

  ctx.save();
  ctx.translate(80, 50);

  const tailCount = Math.max(1, Math.floor(speed * 1.6));
  const tailLen = 15 + speed * 25;
  const waveAmp = 3 + speed * 6;
  const dc = dietColor(0.5, 1.0);
  const dc2 = dietHSL(0.5, 1.0);
  const glowIntensity = Math.max(0, (speed - 1.2) * 0.5);

  for (let ti = 0; ti < tailCount; ti++) {
    const spread = tailCount === 1 ? 0 : ((ti / (tailCount - 1)) - 0.5) * 0.7;
    const baseY = spread * 25;
    const lenVar = 1 + Math.sin(ti * 2.37) * 0.15;
    const speedVar = 1 + Math.sin(ti * 3.71) * 0.12;
    const ampVar = 1 + Math.sin(ti * 1.93) * 0.1;
    const phaseOff = ti * 1.5 + Math.sin(ti * 4.1) * 0.6;
    const thisLen = tailLen * lenVar;

    ctx.lineCap = 'round';

    // Glow trail
    if (glowIntensity > 0) {
      ctx.strokeStyle = hsla(dc2.h, dc2.s + 15, dc2.l + 20, glowIntensity * 0.2);
      ctx.lineWidth = Math.max(3, 5 - ti * 0.5);
      ctx.globalAlpha = 1;
      ctx.beginPath();
      ctx.moveTo(0, baseY);
      for (let i = 1; i <= 12; i++) {
        const frac = i / 12;
        const wave = Math.sin(t * 5 * speedVar + frac * Math.PI * 3 + phaseOff) * waveAmp * ampVar * frac;
        ctx.lineTo(-thisLen * frac, baseY + wave);
      }
      ctx.stroke();
    }

    // Tapered main tail
    const baseWidth = Math.max(2, 3.5 + speed * 0.8 - ti * 0.4);
    let prevX = 0, prevY = baseY;
    const segs = 16;
    for (let i = 1; i <= segs; i++) {
      const frac = i / segs;
      const x = -thisLen * frac;
      const wave = Math.sin(t * 5 * speedVar + frac * Math.PI * 3 + phaseOff) * waveAmp * ampVar * frac;
      const y = baseY + wave;

      ctx.strokeStyle = dc;
      ctx.lineWidth = baseWidth * (1 - frac * 0.8);
      ctx.globalAlpha = 0.85 - frac * 0.25;
      ctx.beginPath();
      ctx.moveTo(prevX, prevY);
      ctx.lineTo(x, y);
      ctx.stroke();

      prevX = x;
      prevY = y;
    }
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawPartShell(ctx, t, defense) {
  const cw = 100, ch = 100;
  ctx.clearRect(0, 0, cw, ch);
  ctx.fillStyle = '#0d1520';
  ctx.fillRect(0, 0, cw, ch);

  ctx.save();
  ctx.translate(50, 50);

  const shellSegments = Math.max(2, Math.floor(defense * 1.8));
  const coverage = 0.5 + Math.min(1, (defense - 1) / 3) * 0.35;
  const arcHalf = coverage * Math.PI;
  const start = Math.PI - arcHalf;
  const end = Math.PI + arcHalf;
  const arcPerSeg = (end - start) / shellSegments;
  const dc = dietHSL(0.5, 1.0);
  const bodyR = 30;

  const innerR = bodyR * (0.88 - defense * 0.01);
  const outerR = bodyR * (1.0 + defense * 0.1);
  const plateAlpha = Math.min(0.9, 0.35 + defense * 0.14);
  const highlightAlpha = Math.min(0.5, 0.15 + defense * 0.08);
  const ridgeAlpha = Math.min(0.5, 0.15 + defense * 0.1);
  const plateSat = Math.max(dc.s - defense * 5, 15);
  const plateLight = dc.l - 12 - defense * 2;

  // Faint body outline
  ctx.strokeStyle = 'rgba(100,140,180,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(0, 0, bodyR, 0, Math.PI * 2);
  ctx.stroke();

  for (let i = 0; i < shellSegments; i++) {
    const a0 = start + i * arcPerSeg - arcPerSeg * 0.15;
    const a1 = start + (i + 1) * arcPerSeg + arcPerSeg * 0.15;
    const shadeMod = (i % 2 === 0) ? 0 : -4;

    ctx.beginPath();
    ctx.arc(0, 0, outerR, a0, a1);
    ctx.arc(0, 0, innerR, a1, a0, true);
    ctx.closePath();
    ctx.fillStyle = hsla(dc.h, plateSat, plateLight + shadeMod, plateAlpha);
    ctx.fill();

    // Inner shadow
    ctx.beginPath();
    ctx.arc(0, 0, innerR + 1, a0, a1);
    ctx.strokeStyle = hsla(dc.h, plateSat, plateLight - 12, plateAlpha * 0.6);
    ctx.lineWidth = 1 + defense * 0.3;
    ctx.stroke();

    // Outer highlight
    ctx.beginPath();
    ctx.arc(0, 0, outerR, a0, a1);
    ctx.strokeStyle = hsla(dc.h, dc.s, dc.l + 20, highlightAlpha);
    ctx.lineWidth = 1.2 + defense * 0.3;
    ctx.stroke();

    // Ridge lines
    if (i > 0) {
      const ridgeAngle = start + i * arcPerSeg;
      ctx.beginPath();
      ctx.moveTo(Math.cos(ridgeAngle) * innerR, Math.sin(ridgeAngle) * innerR);
      ctx.lineTo(Math.cos(ridgeAngle) * outerR, Math.sin(ridgeAngle) * outerR);
      ctx.strokeStyle = hsla(dc.h, plateSat, plateLight - 8, ridgeAlpha);
      ctx.lineWidth = 1 + defense * 0.2;
      ctx.stroke();
    }
  }

  ctx.restore();
}

function drawPartBrain(ctx, t, brainBP) {
  const cw = 100, ch = 100;
  ctx.clearRect(0, 0, cw, ch);
  ctx.fillStyle = '#0d1520';
  ctx.fillRect(0, 0, cw, ch);

  if (brainBP <= 5) {
    ctx.save();
    ctx.translate(50, 50);
    ctx.fillStyle = 'rgba(100,140,180,0.15)';
    ctx.font = '10px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('(minimal)', 0, 4);
    ctx.restore();
    return;
  }

  ctx.save();
  ctx.translate(50, 50);

  const bp = brainBP;
  const galleryR = 35; // virtual body radius for gallery
  const brainFrac = 0.15 + ((bp - 5) / 45) * 0.30;
  const size = Math.min(galleryR * brainFrac, 38); // cap for gallery
  const folds = Math.floor((bp - 5) / 5);
  const H = 210, S = 80, L = 60;

  // Outer glow — bright and unmissable
  const glowI = 0.15 + (bp / 50) * 0.45;
  const glowP = 1 + Math.sin(t * 2) * 0.2;
  const glowR = size * (1.8 + (bp / 50) * 1.0);
  const glow = ctx.createRadialGradient(0, 0, size * 0.1, 0, 0, glowR);
  glow.addColorStop(0, hsla(190, 95, 78, glowI * glowP));
  glow.addColorStop(0.35, hsla(200, 90, 68, glowI * 0.45 * glowP));
  glow.addColorStop(1, hsla(H, 70, 50, 0));
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, glowR, 0, Math.PI * 2);
  ctx.fill();

  // Neural-node cluster — drifting soft overlapping blobs
  const nodeCount = 3 + Math.floor(folds * 0.7);
  for (let i = 0; i < nodeCount; i++) {
    const orbitR = size * (0.1 + (i / nodeCount) * 0.5);
    const orbitSpeed = 0.18 + (i % 3) * 0.07;
    const orbitPhase = i * 2.39996;
    const nx = Math.cos(orbitPhase + t * orbitSpeed) * orbitR;
    const ny = Math.sin(orbitPhase + t * orbitSpeed) * orbitR * 0.7;
    const nodeR = size * (0.3 + 0.06 * Math.sin(i * 1.7 + t * 0.9));

    const nGrad = ctx.createRadialGradient(nx, ny, 0, nx, ny, nodeR);
    nGrad.addColorStop(0,   hsla(195, S + 10, L + 18, 0.40));
    nGrad.addColorStop(0.5, hsla(H, S, L + 5, 0.18));
    nGrad.addColorStop(1,   hsla(H + 10, S - 5, L, 0));
    ctx.fillStyle = nGrad;
    ctx.beginPath();
    ctx.arc(nx, ny, nodeR, 0, Math.PI * 2);
    ctx.fill();
  }

  // Bright pulsing core
  const hlP = 0.6 + Math.sin(t * 2.5) * 0.25;
  const coreR = size * 0.55;
  const hl = ctx.createRadialGradient(0, 0, 0, 0, 0, coreR);
  hl.addColorStop(0,   hsla(185, 95, 90, 0.6 * hlP));
  hl.addColorStop(0.3, hsla(195, 92, 78, 0.25 * hlP));
  hl.addColorStop(1,   hsla(H, 80, 60, 0));
  ctx.fillStyle = hl;
  ctx.beginPath();
  ctx.arc(0, 0, coreR, 0, Math.PI * 2);
  ctx.fill();

  // White edge halo
  const haloA = 0.12 + (bp / 50) * 0.18;
  const haloP = 1 + Math.sin(t * 2.2) * 0.15;
  const haloR = size * 1.05;
  const haloG = ctx.createRadialGradient(0, 0, size * 0.6, 0, 0, haloR);
  haloG.addColorStop(0, hsla(190, 30, 95, 0));
  haloG.addColorStop(0.7, hsla(190, 40, 92, haloA * 0.6 * haloP));
  haloG.addColorStop(1, hsla(200, 30, 90, 0));
  ctx.fillStyle = haloG;
  ctx.beginPath();
  ctx.arc(0, 0, haloR, 0, Math.PI * 2);
  ctx.fill();

  // Neural sparkles (BP > 20)
  if (bp > 20) {
    const sparkCount = Math.floor((bp - 20) / 4);
    for (let i = 0; i < sparkCount; i++) {
      const sa = i * 2.39996 + t * 1.5;
      const sd = size * (0.2 + (i % 3) * 0.18);
      const sx = Math.cos(sa) * sd * 0.9;
      const sy = Math.sin(sa) * sd * 0.6;
      const sparkle = 0.3 + Math.sin(t * 6 + i * 2.1) * 0.35;
      ctx.fillStyle = hsla(185, 95, 87, sparkle);
      ctx.beginPath();
      ctx.arc(sx, sy, 1.3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.restore();
}

function drawPartVenom(ctx, t, str) {
  const cw = 100, ch = 100;
  ctx.clearRect(0, 0, cw, ch);
  ctx.fillStyle = '#0d1520';
  ctx.fillRect(0, 0, cw, ch);

  ctx.save();
  ctx.translate(40, 50);

  const venomH = 280;
  const glandSize = 6 + str * 2;

  // Two glands
  for (const sign of [-1, 1]) {
    const gy = sign * 12;
    const pulse = 1 + Math.sin(t * 2.5 + sign) * 0.1;
    const gr = glandSize * pulse;
    const grad = ctx.createRadialGradient(0, gy, 0, 0, gy, gr);
    grad.addColorStop(0, hsla(venomH, 60, 50, 0.6));
    grad.addColorStop(0.5, hsla(venomH, 55, 45, 0.3));
    grad.addColorStop(1, hsla(venomH, 50, 40, 0));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, gy, gr, 0, Math.PI * 2);
    ctx.fill();

    // Drip
    const dripY = gy + 8 + Math.sin(t * 3 + sign * 2) * 4;
    ctx.fillStyle = hsla(venomH, 65, 55, 0.5);
    ctx.beginPath();
    ctx.arc(2, dripY, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawPartArmor(ctx, t, side) {
  const cw = 100, ch = 100;
  ctx.clearRect(0, 0, cw, ch);
  ctx.fillStyle = '#0d1520';
  ctx.fillRect(0, 0, cw, ch);

  ctx.save();
  ctx.translate(50, 50);

  const bodyR = 25;
  const dc = dietHSL(0.5, 1.0);
  const isFront = side === 'front';
  const spikeCount = 5;
  const startDeg = isFront ? -70 : 110;
  const endDeg = isFront ? 70 : 250;
  const startRad = startDeg * Math.PI / 180;
  const endRad = endDeg * Math.PI / 180;

  // Faint body outline
  ctx.strokeStyle = 'rgba(100,140,180,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(0, 0, bodyR, 0, Math.PI * 2);
  ctx.stroke();

  for (let i = 0; i < spikeCount; i++) {
    const frac = i / (spikeCount - 1);
    const angle = startRad + frac * (endRad - startRad);
    const baseX = Math.cos(angle) * bodyR;
    const baseY = Math.sin(angle) * bodyR;
    const centerFrac = 1 - Math.abs(frac - 0.5) * 1.4;
    const spikeLen = 8 + centerFrac * 8;
    const spikeWidth = 3;

    const tipX = baseX + Math.cos(angle) * spikeLen;
    const tipY = baseY + Math.sin(angle) * spikeLen;
    const perpX = -Math.sin(angle) * spikeWidth;
    const perpY = Math.cos(angle) * spikeWidth;

    ctx.beginPath();
    ctx.moveTo(baseX + perpX, baseY + perpY);
    ctx.lineTo(tipX, tipY);
    ctx.lineTo(baseX - perpX, baseY - perpY);
    ctx.closePath();
    ctx.fillStyle = hsla(dc.h, 25, dc.l + 10, 0.7);
    ctx.fill();
    ctx.strokeStyle = hsla(dc.h, 20, dc.l - 10, 0.4);
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  ctx.restore();
}

function drawPartCamo(ctx, t, density) {
  const cw = 100, ch = 100;
  ctx.clearRect(0, 0, cw, ch);
  ctx.fillStyle = '#0d1520';
  ctx.fillRect(0, 0, cw, ch);

  ctx.save();
  ctx.translate(50, 50);

  const bodyR = 25;
  const dc = dietHSL(0.5, 1.0);

  // Body fill
  ctx.fillStyle = hsl(dc.h, dc.s, dc.l);
  ctx.beginPath();
  ctx.arc(0, 0, bodyR, 0, Math.PI * 2);
  ctx.fill();

  // Clip to body
  ctx.save();
  ctx.beginPath();
  ctx.arc(0, 0, bodyR, 0, Math.PI * 2);
  ctx.clip();

  const spotCount = Math.floor(6 + density * 10);
  for (let i = 0; i < spotCount; i++) {
    const sx = (Math.sin(i * 7.31 + 0.5) * 0.5) * bodyR * 1.6;
    const sy = (Math.cos(i * 11.17 + 0.3) * 0.5) * bodyR * 1.6;
    const sr = 3 + Math.sin(i * 3.91) * 2;
    const spotH = i % 3 === 0 ? accentHue : dc.h + (i % 2 === 0 ? 15 : -12);
    const alpha = 0.15 + density * 0.3;

    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr);
    grad.addColorStop(0, hsla(spotH, dc.s, dc.l + 10, alpha));
    grad.addColorStop(1, hsla(spotH, dc.s, dc.l, 0));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore(); // unclip

  // Body outline
  ctx.strokeStyle = hsl(dc.h, dc.s + 10, dc.l - 18);
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 0, bodyR, 0, Math.PI * 2);
  ctx.stroke();

  ctx.restore();
}

function drawPartPelletMeat(ctx, t) {
  const cw = 100, ch = 100;
  ctx.clearRect(0, 0, cw, ch);
  ctx.fillStyle = '#0d1520';
  ctx.fillRect(0, 0, cw, ch);

  const dc = { h: 5, s: 60, l: 40 };
  // 6 meat pellets — small/compact/dense, scattered with gentle bob
  const pellets = [
    { x: 25, y: 30, r: 4.0, el: 0.85 },
    { x: 55, y: 25, r: 3.2, el: 0.90 },
    { x: 75, y: 45, r: 4.8, el: 0.75 },
    { x: 40, y: 55, r: 3.5, el: 0.80 },
    { x: 65, y: 70, r: 4.2, el: 0.88 },
    { x: 20, y: 68, r: 3.0, el: 0.92 },
  ];
  for (let i = 0; i < pellets.length; i++) {
    const p = pellets[i];
    const bob = Math.sin(t * 1.5 + i * 1.1) * 1.5;
    const rot = Math.sin(t * 0.8 + i * 2.3) * 0.3;
    // Last pellet faded/greyed to hint at decay
    const alpha = (i === pellets.length - 1) ? 0.4 : 0.85;
    drawSinglePellet(ctx, p.x, p.y + bob, p.r, p.el, rot, 'meat', alpha, dc);
  }
}

function drawPartPelletPlant(ctx, t) {
  const cw = 100, ch = 100;
  ctx.clearRect(0, 0, cw, ch);
  ctx.fillStyle = '#0d1520';
  ctx.fillRect(0, 0, cw, ch);

  const dc = { h: 120, s: 55, l: 45 };
  // 6 plant pellets — larger, more elongated/organic, lighter float
  const pellets = [
    { x: 30, y: 28, r: 6.5, el: 0.60 },
    { x: 60, y: 22, r: 5.5, el: 0.70 },
    { x: 78, y: 50, r: 7.5, el: 0.55 },
    { x: 22, y: 55, r: 6.0, el: 0.65 },
    { x: 50, y: 65, r: 7.0, el: 0.58 },
    { x: 72, y: 78, r: 5.8, el: 0.72 },
  ];
  for (let i = 0; i < pellets.length; i++) {
    const p = pellets[i];
    const sway = Math.sin(t * 1.2 + i * 0.9) * 2.5;
    const rot = Math.sin(t * 0.6 + i * 1.7) * 0.5 + i * 0.5;
    drawSinglePellet(ctx, p.x + sway * 0.3, p.y + sway, p.r, p.el, rot, 'plant', 0.85, dc);
  }
}

function spawnPellets(type, count) {
  // Place pellets in a scattered ring around the organism
  const bodyR = g_cachedGeometry ? Math.max(g_cachedGeometry.rx, g_cachedGeometry.ry) : 50;
  const minR = bodyR + 20;
  const maxR = bodyR + 80;
  const isMeat = type === 'meat';
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.6;
    const dist = minR + Math.random() * (maxR - minR);
    pelletPreviewParticles.push({
      x: Math.cos(angle) * dist,
      y: Math.sin(angle) * dist,
      size: isMeat ? (3 + Math.random() * 2) : (5 + Math.random() * 3),
      elongation: isMeat ? (0.7 + Math.random() * 0.3) : (0.5 + Math.random() * 0.35),
      rot: Math.random() * Math.PI * 2,
      type: type,
      phase: Math.random() * Math.PI * 2, // for idle bob
    });
  }
}

function drawPelletPreview(ctx, cx, cy) {
  const dc = { h: 0, s: 0, l: 50 };
  for (const p of pelletPreviewParticles) {
    const bob = Math.sin(time * 1.2 + p.phase) * 0.8;
    drawSinglePellet(ctx, cx + p.x, cy + p.y + bob, p.size, p.elongation, p.rot, p.type, 0.85, dc);
  }
}

function updateBP() {
  const bodyBP = calcBodyBP();
  const brainBP = calcBrainBP();
  const traitBP = calcTraitBP();
  const totalBP = bodyBP + brainBP + traitBP;
  const s = getStats();
  const dc = dietHSL(s.diet, s.metabolism);

  const bodyPct = Math.min(100, bodyBP);
  const brainPct = Math.min(100 - bodyPct, brainBP);
  const traitPct = Math.min(100 - bodyPct - Math.max(0, brainPct), traitBP);

  const bodyFill = document.getElementById('bodyFill');
  const brainFill = document.getElementById('brainFill');
  const traitFill = document.getElementById('traitFill');
  const bpText = document.getElementById('bpText');

  bodyFill.style.width = bodyPct + '%';
  bodyFill.style.background = totalBP > 100 ? '#ef5350' : hsl(dc.h, dc.s, dc.l);

  brainFill.style.width = Math.max(0, brainPct) + '%';
  brainFill.style.background = totalBP > 100 ? '#b71c1c' : '#00bcd4';

  traitFill.style.width = Math.max(0, traitPct) + '%';
  traitFill.style.background = totalBP > 100 ? '#8b0000' : '#ff9800';

  const overColor = totalBP > 100 ? ' style="color:#ef5350"' : '';
  const traitStr = traitBP > 0 ? ` + <span class="trait-bp">${traitBP}T</span>` : '';
  bpText.innerHTML = `<span class="body-bp">${bodyBP.toFixed(0)}B</span> + <span class="brain-bp">${brainBP}Br</span>${traitStr} = <span class="total-bp"${overColor}>${totalBP.toFixed(0)} / 100</span>`;
}

// ============================================================
// MAIN ANIMATION LOOP
// ============================================================

const CANVAS_W = 560;
const CANVAS_H = 560;
let mainCanvas, mainCtx, mainDpr;

function initCanvas() {
  mainCanvas = document.getElementById('mainCanvas');
  mainDpr = window.devicePixelRatio || 1;
  mainCanvas.width = CANVAS_W * mainDpr;
  mainCanvas.height = CANVAS_H * mainDpr;
  mainCanvas.style.width = CANVAS_W + 'px';
  mainCanvas.style.height = CANVAS_H + 'px';
  mainCtx = mainCanvas.getContext('2d');
}

function mainLoop(timestamp) {
  const dt = lastFrameTime ? (timestamp - lastFrameTime) / 1000 : 0.016;
  lastFrameTime = timestamp;
  time += dt;
  animStateTime += dt;

  // Blink logic
  if (!isBlinking) {
    nextBlinkTime -= dt;
    if (nextBlinkTime <= 0) {
      isBlinking = true;
      blinkRawProgress = 0;
      nextBlinkTime = 2 + Math.random() * 4;
    }
  } else {
    blinkRawProgress += dt * 12; // ~0.17s full blink cycle
    if (blinkRawProgress >= 2) {
      isBlinking = false;
      blinkRawProgress = 0;
    }
  }
  // Convert raw 0→2 to rendered 0→1→0 (close then open)
  blinkProgress = isBlinking
    ? (blinkRawProgress > 1 ? 2 - blinkRawProgress : blinkRawProgress)
    : 0;

  // Draw main canvas
  mainCtx.setTransform(mainDpr, 0, 0, mainDpr, 0, 0);

  const s = getStats();
  const biome = BIOME_COLORS[currentBiome];

  if (exploreMode) {
    updateWander(dt);
    drawBackgroundExplore(mainCtx, CANVAS_W, CANVAS_H, currentBiome);
    drawBiomePellets(mainCtx);

    // Draw organism at wander position with facing rotation
    mainCtx.save();
    mainCtx.translate(orgX, orgY);
    mainCtx.rotate(orgAngle);
    drawOrganism(mainCtx, s, time, currentAnimState, 0, 0);
    mainCtx.restore();
  } else {
    drawBackground(mainCtx, CANVAS_W, CANVAS_H, biome);
    drawOrganism(mainCtx, s, time, currentAnimState, CANVAS_W, CANVAS_H);

    // Draw spawned pellet preview particles
    if (pelletPreviewParticles.length > 0) {
      drawPelletPreview(mainCtx, CANVAS_W / 2, CANVAS_H / 2);
    }
  }

  // Draw gallery canvases
  for (const group of GALLERY_PARTS) {
    for (const item of group.items) {
      if (!item.canvas) continue;
      const gctx = item.canvas.getContext('2d');
      gctx.setTransform(2, 0, 0, 2, 0, 0); // 2x DPR for 200px canvas → 100px display
      item.draw(gctx, time);
    }
  }

  requestAnimationFrame(mainLoop);
}

// ============================================================
// INIT
// ============================================================

buildControls();
buildArchetypes();
buildTraitsPanel();
buildStatePanel();
buildAccentSlider();
buildGallery();
setupEvents();
initCanvas();
setArchetype('herbivore');

requestAnimationFrame(mainLoop);

// Handle resize
window.addEventListener('resize', () => {
  // Canvas size is fixed, no resize needed for main canvas
  // Gallery canvases are fixed size too
});
</script>
