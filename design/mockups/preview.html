<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Game — Organism Designer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0f1a;
    color: #e0e8f0;
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: 40px;
  }

  h1 {
    text-align: center;
    padding: 14px 20px 10px;
    font-size: 1.2rem;
    font-weight: 500;
    color: #8090a0;
    letter-spacing: 0.05em;
  }
  h1 span { color: #4fc3f7; }

  .subtitle {
    text-align: center;
    color: #5a6a7a;
    font-size: 0.8rem;
    margin-bottom: 20px;
  }

  /* --- Archetype Buttons --- */
  .archetypes {
    display: flex;
    gap: 6px;
    margin: 0 20px 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .arch-btn {
    background: #1e2d40;
    border: 1px solid #2a3a50;
    color: #8090a0;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.75rem;
    transition: all 0.15s;
  }
  .arch-btn:hover { background: #2a3a50; color: #e0e8f0; border-color: #4fc3f7; }
  .arch-btn.active { background: #1a3a5a; border-color: #4fc3f7; color: #4fc3f7; }

  /* --- BP Budget Bar --- */
  .bp-bar {
    margin: 0 20px 10px;
    background: #141e2e;
    border: 1px solid #2a3a50;
    border-radius: 8px;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.78rem;
  }
  .bp-bar .label { color: #8090a0; white-space: nowrap; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; }
  .bp-bar .bar-track {
    flex: 1;
    height: 10px;
    background: #2a3a50;
    border-radius: 5px;
    overflow: hidden;
    display: flex;
  }
  .bp-bar .bar-fill {
    height: 100%;
    transition: width 0.2s;
  }
  .bp-bar .bar-fill.body-fill { border-radius: 5px 0 0 5px; }
  .bp-bar .bar-fill.brain-fill { background: #00bcd4; border-radius: 0 5px 5px 0; }
  .bp-bar .bp-text {
    font-variant-numeric: tabular-nums;
    min-width: 130px;
    text-align: right;
    font-size: 0.72rem;
  }
  .bp-text .body-bp { opacity: 0.8; }
  .bp-text .brain-bp { color: #00bcd4; opacity: 0.8; }
  .bp-text .total-bp { font-weight: 600; }

  /* --- Controls Grid --- */
  .controls-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 24px;
    margin: 0 20px 12px;
    background: #141e2e;
    border: 1px solid #2a3a50;
    border-radius: 10px;
    padding: 14px 18px;
  }
  .controls-col h3 {
    font-size: 0.65rem;
    color: #5a7a9a;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    border-bottom: 1px solid #2a3a50;
    padding-bottom: 4px;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 6px;
  }
  .control-group label {
    font-size: 0.7rem;
    color: #8090a0;
    display: flex;
    justify-content: space-between;
  }
  .control-group label .val {
    color: #4fc3f7;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .control-group.brain-control label .val { color: #00bcd4; }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 5px;
    border-radius: 3px;
    background: #2a3a50;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #4fc3f7;
    cursor: pointer;
    border: 2px solid #0a0f1a;
  }
  input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #4fc3f7;
    cursor: pointer;
    border: 2px solid #0a0f1a;
  }
  .brain-control input[type="range"]::-webkit-slider-thumb { background: #00bcd4; }
  .brain-control input[type="range"]::-moz-range-thumb { background: #00bcd4; }

  /* --- Biome + Animation Row --- */
  .biome-anim-row {
    display: flex;
    gap: 20px;
    margin: 0 20px 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .biome-selector, .anim-selector {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .biome-selector span, .anim-selector span {
    font-size: 0.68rem;
    color: #5a7a9a;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  .biome-btn {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
  }
  .biome-btn.active { border-color: #4fc3f7; transform: scale(1.15); }
  .biome-btn:hover { transform: scale(1.1); }
  .anim-btn {
    background: #1e2d40;
    border: 1px solid #2a3a50;
    color: #6a7a8a;
    padding: 3px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.68rem;
    transition: all 0.15s;
  }
  .anim-btn:hover { background: #2a3a50; color: #e0e8f0; }
  .anim-btn.active { background: #1a3a5a; border-color: #4fc3f7; color: #4fc3f7; }

  /* --- Main Canvas --- */
  .canvas-container {
    display: flex;
    justify-content: center;
    margin: 0 20px 16px;
  }
  #mainCanvas {
    border-radius: 12px;
    border: 1px solid #2a3a50;
    background: #0d1520;
  }

  /* --- Parts Gallery --- */
  .parts-gallery {
    margin: 0 20px;
    background: #141e2e;
    border: 1px solid #2a3a50;
    border-radius: 10px;
    padding: 12px 16px;
    overflow-x: auto;
  }
  .parts-gallery h2 {
    font-size: 0.7rem;
    color: #5a7a9a;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }
  .gallery-row {
    display: flex;
    gap: 16px;
    min-width: max-content;
  }
  .part-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .part-group h3 {
    font-size: 0.62rem;
    color: #5a7a9a;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .part-items {
    display: flex;
    gap: 6px;
  }
  .part-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .part-item canvas {
    border-radius: 6px;
    border: 1px solid #2a3a50;
    background: #0d1520;
  }
  .part-item span {
    font-size: 0.58rem;
    color: #6a7a8a;
  }

  /* --- Trait BP text --- */
  .bp-text .trait-bp { color: #ff9800; opacity: 0.8; }
  .bp-bar .bar-fill.trait-fill { background: #ff9800; }

  /* --- Traits Panel --- */
  .traits-panel {
    margin: 0 20px 12px;
    background: #141e2e;
    border: 1px solid #2a3a50;
    border-radius: 10px;
    padding: 12px 16px;
  }
  .traits-panel h3 {
    font-size: 0.65rem;
    color: #5a7a9a;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    border-bottom: 1px solid #2a3a50;
    padding-bottom: 4px;
  }
  .traits-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 6px 16px;
  }
  .trait-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .trait-item input[type="checkbox"] {
    accent-color: #ff9800;
    width: 14px;
    height: 14px;
    cursor: pointer;
  }
  .trait-item label {
    font-size: 0.7rem;
    color: #8090a0;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .trait-item .trait-cost {
    font-size: 0.6rem;
    color: #ff9800;
    opacity: 0.7;
  }
  .trait-sub {
    margin-left: 24px;
    margin-top: 3px;
    display: none;
  }
  .trait-sub.visible { display: flex; gap: 8px; align-items: center; }
  .trait-sub label {
    font-size: 0.65rem;
    color: #6a7a8a;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .trait-sub input[type="radio"] {
    accent-color: #ff9800;
    width: 12px;
    height: 12px;
    cursor: pointer;
  }

  /* --- State Panel --- */
  .state-panel {
    margin: 0 20px 12px;
    background: #141e2e;
    border: 1px solid #2a3a50;
    border-radius: 10px;
    padding: 12px 16px;
  }
  .state-panel h3 {
    font-size: 0.65rem;
    color: #5a7a9a;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    border-bottom: 1px solid #2a3a50;
    padding-bottom: 4px;
  }
  .state-sliders {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px 24px;
  }

  /* --- Accent Color --- */
  .accent-panel {
    margin: 0 20px 12px;
    background: #141e2e;
    border: 1px solid #2a3a50;
    border-radius: 10px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .accent-panel h3 {
    font-size: 0.65rem;
    color: #5a7a9a;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }
  .accent-panel input[type="range"] {
    flex: 1;
    background: linear-gradient(to right,
      hsl(0,70%,50%), hsl(60,70%,50%), hsl(120,70%,50%),
      hsl(180,70%,50%), hsl(240,70%,50%), hsl(300,70%,50%), hsl(360,70%,50%));
  }
  .accent-swatch {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid #2a3a50;
    flex-shrink: 0;
  }

  /* --- Pellet Spawner Panel --- */
  .pellet-panel {
    margin: 0 20px 12px;
    background: #141e2e;
    border: 1px solid #2a3a50;
    border-radius: 10px;
    padding: 12px 16px;
  }
  .pellet-panel h3 {
    font-size: 0.65rem;
    color: #5a7a9a;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    border-bottom: 1px solid #2a3a50;
    padding-bottom: 4px;
  }

  @media (max-width: 700px) {
    .controls-grid { grid-template-columns: 1fr; }
    .biome-anim-row { flex-direction: column; align-items: flex-start; }
    .state-sliders { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1><span>Life Game</span> — Organism Designer</h1>
<p class="subtitle">Design. Explore. Evolve.</p>

<!-- Archetype presets -->
<div class="archetypes" id="archetypeBar"></div>

<!-- BP Budget bar -->
<div class="bp-bar">
  <span class="label">Bio-Points</span>
  <div class="bar-track">
    <div class="bar-fill body-fill" id="bodyFill"></div>
    <div class="bar-fill brain-fill" id="brainFill"></div>
    <div class="bar-fill trait-fill" id="traitFill"></div>
  </div>
  <span class="bp-text" id="bpText"></span>
</div>

<!-- Stat sliders: two columns -->
<div class="controls-grid">
  <div class="controls-col" id="bodyControls">
    <h3>Body Stats</h3>
  </div>
  <div class="controls-col" id="senseControls">
    <h3>Senses &amp; Brain</h3>
  </div>
</div>

<!-- Biome + Animation state -->
<div class="biome-anim-row">
  <div class="biome-selector">
    <span>Biome:</span>
    <button class="biome-btn active" style="background:#2d5a3a" data-biome="grassland" title="Grassland"></button>
    <button class="biome-btn" style="background:#1d3320" data-biome="forest" title="Forest"></button>
    <button class="biome-btn" style="background:#5a4020" data-biome="desert" title="Desert"></button>
    <button class="biome-btn" style="background:#204050" data-biome="wetland" title="Wetland"></button>
    <button class="biome-btn" style="background:#3a3535" data-biome="rocky" title="Rocky"></button>
  </div>
  <div class="anim-selector">
    <span>State:</span>
    <button class="anim-btn active" data-state="idle">Idle</button>
    <button class="anim-btn" data-state="eating">Eating</button>
    <button class="anim-btn" data-state="pheromone">Pheromone</button><!--
    --><button class="phero-type-btn active" data-phero="0" title="Red pheromone" style="background:#e05050;width:14px;height:14px;border-radius:50%;border:2px solid transparent;cursor:pointer;margin-left:2px;vertical-align:middle"></button><!--
    --><button class="phero-type-btn" data-phero="1" title="Green pheromone" style="background:#50c050;width:14px;height:14px;border-radius:50%;border:2px solid transparent;cursor:pointer;margin-left:1px;vertical-align:middle"></button><!--
    --><button class="phero-type-btn" data-phero="2" title="Blue pheromone" style="background:#5080e0;width:14px;height:14px;border-radius:50%;border:2px solid transparent;cursor:pointer;margin-left:1px;vertical-align:middle"></button>
    <button class="anim-btn" data-state="fleeing">Fleeing</button>
    <button class="anim-btn" data-state="burrowing">Burrowing</button>
    <button class="anim-btn" data-state="laying_eggs">Laying Eggs</button>
    <button class="anim-btn" data-state="attacking">Attacking</button>
    <button class="anim-btn" data-state="damaged">Damaged</button>
    <button class="anim-btn" data-state="dying">Dying</button>
    <button class="anim-btn" data-state="hatching">Hatching</button>
    <button class="anim-btn" data-state="poisoned">Poisoned</button>
    <button class="anim-btn" data-state="surfacing">Surfacing</button>
  </div>
  <div class="internals-toggle">
    <button class="anim-btn" id="btnInternals" title="Show brain, stomach, organelles">Internals</button>
    <button class="anim-btn" id="btnExplore" title="Organism wanders in biome">Explore</button>
  </div>
</div>

<!-- Traits panel -->
<div class="traits-panel">
  <h3>Unlockable Traits</h3>
  <div class="traits-grid" id="traitsGrid"></div>
</div>

<!-- State panel -->
<div class="state-panel">
  <h3>Dynamic State</h3>
  <div class="state-sliders" id="stateSliders"></div>
</div>

<!-- Accent color -->
<div class="accent-panel">
  <h3>Accent Hue</h3>
  <input type="range" id="accentSlider" min="0" max="360" step="1" value="180">
  <div class="accent-swatch" id="accentSwatch"></div>
</div>

<!-- Pellet spawner -->
<div class="pellet-panel">
  <h3>Pellets</h3>
  <div style="display:flex; gap:8px; flex-wrap:wrap;">
    <button class="anim-btn" id="spawnMeat">Spawn Meat</button>
    <button class="anim-btn" id="spawnPlant">Spawn Plant</button>
    <button class="anim-btn" id="clearPellets">Clear</button>
  </div>
</div>

<!-- Main canvas -->
<div class="canvas-container">
  <canvas id="mainCanvas" width="1120" height="1120"></canvas>
</div>

<!-- Parts gallery -->
<div class="parts-gallery">
  <h2>Parts Gallery</h2>
  <div class="gallery-row" id="galleryRow"></div>
</div>

<script>
// ============================================================
// DATA & STATE
// ============================================================

const STATS = {
  size:       { label: 'Size',        min: 0.3, max: 3.0, step: 0.1, value: 1.0, bpFn: v => 10 * v * v, group: 'body' },
  speed:      { label: 'Speed',       min: 0.2, max: 2.5, step: 0.1, value: 1.0, bpFn: v => 10 * v, group: 'body' },
  strength:   { label: 'Strength',    min: 0.1, max: 5.0, step: 0.1, value: 1.0, bpFn: v => 6 * v, group: 'body' },
  defense:    { label: 'Defense',     min: 0.0, max: 4.0, step: 0.1, value: 0.5, bpFn: v => 6 * v, group: 'body' },
  diet:       { label: 'Diet (herb↔carn)', min: 0.0, max: 1.0, step: 0.05, value: 0.5, bpFn: () => 0, group: 'body' },
  metabolism: { label: 'Metabolism',   min: 0.5, max: 3.0, step: 0.1, value: 1.0, bpFn: () => 0, group: 'body' },
  stomach:    { label: 'Stomach',     min: 0.3, max: 2.0, step: 0.1, value: 1.0, bpFn: v => 6 * v, group: 'body' },
  viewAngle:  { label: 'View Angle (°)', min: 15, max: 360, step: 5, value: 120, bpFn: v => v / 45, group: 'sense' },
  viewRadius: { label: 'View Radius', min: 1.0, max: 10.0, step: 0.5, value: 5.0, bpFn: v => 2 * v, group: 'sense' },
  brainBP:    { label: 'Brain BP',    min: 0,   max: 50,  step: 1,   value: 18,  bpFn: v => v, group: 'sense' },
};

const ARCHETYPES = {
  herbivore:  { size:1.0, speed:1.2, strength:0.5, defense:0.5, diet:0.0, viewAngle:180, viewRadius:5.0, metabolism:1.0, stomach:1.5, brainBP:20 },
  carnivore:  { size:1.2, speed:1.5, strength:2.5, defense:0.3, diet:1.0, viewAngle:90,  viewRadius:7.0, metabolism:1.2, stomach:0.8, brainBP:20 },
  omnivore:   { size:1.0, speed:1.0, strength:1.0, defense:1.0, diet:0.5, viewAngle:120, viewRadius:5.0, metabolism:1.0, stomach:1.2, brainBP:18 },
  scavenger:  { size:0.7, speed:0.8, strength:0.3, defense:1.5, diet:0.5, viewAngle:270, viewRadius:8.0, metabolism:0.8, stomach:1.0, brainBP:15 },
  tank:       { size:1.5, speed:0.5, strength:1.0, defense:3.5, diet:0.3, viewAngle:180, viewRadius:4.0, metabolism:0.7, stomach:1.5, brainBP:10 },
  scout:      { size:0.5, speed:2.0, strength:0.3, defense:0.2, diet:0.0, viewAngle:360, viewRadius:9.0, metabolism:1.5, stomach:0.5, brainBP:15 },
  assassin:   { size:0.8, speed:1.8, strength:3.0, defense:0.1, diet:1.0, viewAngle:60,  viewRadius:8.0, metabolism:2.0, stomach:0.5, brainBP:12 },
  bigBrain:   { size:0.5, speed:0.5, strength:0.3, defense:0.3, diet:0.5, viewAngle:120, viewRadius:6.0, metabolism:1.0, stomach:0.5, brainBP:45 },
  tinyBrain:  { size:2.0, speed:1.5, strength:2.0, defense:2.0, diet:0.5, viewAngle:90,  viewRadius:3.0, metabolism:1.0, stomach:1.5, brainBP:5 },
};

const ARCHETYPE_LABELS = {
  herbivore: 'Herbivore', carnivore: 'Carnivore', omnivore: 'Omnivore',
  scavenger: 'Scavenger', tank: 'Tank', scout: 'Scout', assassin: 'Assassin',
  bigBrain: 'Big Brain', tinyBrain: 'Tiny Brain',
};

const BIOME_COLORS = {
  grassland: { bg1: '#1a3a2a', bg2: '#2d5a3a', particle: '#4a7a5a', plantDensity: 1.0, plantSize: 1.0, movementCost: 1.0, ambientCount: 14 },
  forest:    { bg1: '#1a2a1a', bg2: '#1d3320', particle: '#3a5a3a', plantDensity: 1.5, plantSize: 1.5, movementCost: 1.0, ambientCount: 28 },
  desert:    { bg1: '#3a2a1a', bg2: '#5a4020', particle: '#7a5a3a', plantDensity: 0.2, plantSize: 0.5, movementCost: 1.3, ambientCount: 6 },
  wetland:   { bg1: '#1a2a3a', bg2: '#204050', particle: '#3a5a6a', plantDensity: 0.8, plantSize: 1.0, movementCost: 0.7, ambientCount: 20 },
  rocky:     { bg1: '#2a2a2a', bg2: '#3a3535', particle: '#5a5555', plantDensity: 0.3, plantSize: 0.7, movementCost: 1.0, ambientCount: 8 },
};

let currentBiome = 'grassland';
let currentAnimState = 'idle';
let currentArchetype = 'herbivore';
let showInternals = false;
let pheromoneType = 0; // 0=red, 1=green, 2=blue
let time = 0;
let animStateTime = 0;
let lastFrameTime = 0;
let nextBlinkTime = 2 + Math.random() * 4;
let blinkRawProgress = 0; // raw counter 0→2
let blinkProgress = 0; // rendered value 0→1→0
let isBlinking = false;

// Particle systems for animation overlays
let pheromoneParticles = [];
let eatingParticle = null;
let burrowDirtParticles = [];
let fleeingBubbles = [];
let eggState = null;

// Trait toggles
let traitVenom = false;
let traitEcholocation = false;
let traitCamouflage = false;
let traitFatReserves = false;
let traitArmorPlating = false;
let traitArmorSide = 'back';  // 'front' | 'back'
let traitSporeDispersal = false;
let traitSexualRepro = false;
let traitSex = 'female';  // 'female' | 'male'

// Trait BP costs
const TRAIT_BP = {
  venom: 8,
  echolocation: 10,
  camouflage: 10,
  fatReserves: 5,
  armorPlating: 12,
  sporeDispersal: 8,
  sexualRepro: 10,
};

// Dynamic state (NOT stat sliders — no BP cost)
let stateEnergy = 1.0;    // 0–1
let stateHealth = 1.0;    // 0–1
let stateMaturity = 1.0;  // 0–1
let stateFatFill = 0.5;   // 0–1

// Accent color
let accentHue = 180;

// Particle arrays for new effects
let echoRings = [];
let venomDrips = [];
let attackParticles = [];
let damageParticles = [];
let dyingFragments = [];
let poisonParticles = [];
let surfaceDirtParticles = [];
let sporeParticles = [];
let pelletPreviewParticles = [];

// Dying/hatching state (play-once animations)
let dyingPhase = 0;     // 0=pre, 1=wobble, 2=pop, 3=done
let dyingTime = 0;
let hatchingPhase = 0;  // 0=egg, 1=crack, 2=burst, 3=baby
let hatchingTime = 0;

// Explore mode
let exploreMode = false;
let orgX = 280, orgY = 280;         // organism world position
let orgTargetX = 280, orgTargetY = 280;
let orgAngle = 0;                    // facing angle (radians, 0=right)
let orgWanderTimer = 0;
let biomePellets = [];               // biome food pellets
let biomeAmbient = [];               // pre-generated ambient element descriptors

// ============================================================
// COLOR UTILITIES
// ============================================================

function hsl(h, s, l) { return `hsl(${h}, ${s}%, ${l}%)`; }
function hsla(h, s, l, a) { return `hsla(${h}, ${s}%, ${l}%, ${a})`; }

function dietHSL(diet, metabolism) {
  const h = 120 - diet * 120;
  const s = Math.min(100, 55 + (metabolism || 1) * 10);
  return { h, s, l: 50 };
}

function dietColor(diet, metabolism) {
  const c = dietHSL(diet, metabolism);
  return hsl(c.h, c.s, c.l);
}
function dietColorLight(diet, metabolism) {
  const c = dietHSL(diet, metabolism);
  return hsl(c.h, Math.max(0, c.s - 10), 70);
}
function dietColorDark(diet, metabolism) {
  const c = dietHSL(diet, metabolism);
  return hsl(c.h, Math.min(100, c.s + 10), 30);
}
function dietColorA(diet, metabolism, alpha) {
  const c = dietHSL(diet, metabolism);
  return hsla(c.h, c.s, c.l, alpha);
}

function irisColor(diet) {
  // Smooth gradient: green (herb) → yellow-green → amber (carn)
  return {
    h: 140 - diet * 110,      // 140 → 30
    s: 55 + diet * 15,        // 55 → 70
    l: 44 + diet * 6,         // 44 → 50
  };
}

// Interpolate between two hues on the color wheel
function accentMix(baseH, fraction) {
  let diff = accentHue - baseH;
  if (diff > 180) diff -= 360;
  if (diff < -180) diff += 360;
  return (baseH + diff * fraction + 360) % 360;
}

// ============================================================
// STAT HELPERS
// ============================================================

function getStats() {
  const s = {};
  for (const k in STATS) s[k] = STATS[k].value;
  return s;
}

function calcBodyBP() {
  let total = 0;
  for (const k in STATS) {
    if (k !== 'brainBP') total += STATS[k].bpFn(STATS[k].value);
  }
  return Math.round(total * 10) / 10;
}

function calcBrainBP() {
  return STATS.brainBP.value;
}

function calcTraitBP() {
  let total = 0;
  if (traitVenom) total += TRAIT_BP.venom;
  if (traitEcholocation) total += TRAIT_BP.echolocation;
  if (traitCamouflage) total += TRAIT_BP.camouflage;
  if (traitFatReserves) total += TRAIT_BP.fatReserves;
  if (traitArmorPlating) total += TRAIT_BP.armorPlating;
  if (traitSporeDispersal) total += TRAIT_BP.sporeDispersal;
  if (traitSexualRepro) total += TRAIT_BP.sexualRepro;
  return total;
}

// ============================================================
// GEOMETRY COMPUTATION
// ============================================================

function sizeTier(size) {
  if (size < 0.6) return 'tiny';
  if (size < 1.0) return 'small';
  if (size < 1.8) return 'normal';
  if (size < 2.5) return 'large';
  return 'huge';
}

function computeGeometry(s) {
  const baseR = 40 * Math.sqrt(s.size);
  const tier = sizeTier(s.size);

  // Body shape — NO speed stretch, slight oval for non-tiny
  const ovalFactor = tier === 'tiny' ? 1.02 : 1.18;
  const rx = baseR * ovalFactor;
  const ry = baseR;

  // Eyes — cap visual size relative to body, excess VR becomes detail
  const maxEyeR = Math.min(12, rx * 0.28);
  const eyeR = Math.min(maxEyeR, (5 + s.viewRadius * 1.5) * Math.max(0.4, rx / 45));
  const eyeDetailLevel = Math.max(0, s.viewRadius - 5); // 0-5, drives extra detail
  const viewAngleRad = s.viewAngle * Math.PI / 180;

  // Max eyes by tier
  let maxEyesByTier;
  switch (tier) {
    case 'tiny': maxEyesByTier = 1; break;
    case 'small': maxEyesByTier = 2; break;
    default: maxEyesByTier = s.viewAngle > 250 ? 4 : s.viewAngle > 150 ? 3 : 2;
  }

  // Max eyes by spacing (prevent overlap, using capped size)
  const minAngularSpacing = 2.2 * eyeR / rx;
  const availableArc = viewAngleRad;
  const maxEyesBySpace = Math.max(1, Math.floor(availableArc / minAngularSpacing) + 1);
  const eyeCount = Math.min(maxEyesByTier, maxEyesBySpace);

  // Mouth dimensions (scale with STR and body size)
  const mouthScale = Math.max(0.4, Math.min(1, rx / 45));
  const mouthW = (8 + s.strength * 6) * mouthScale;
  const mouthH = (5 + s.strength * 4) * mouthScale;

  // Tails (driven by speed, NOT body shape)
  const tailCount = Math.max(1, Math.floor(s.speed * 1.6));
  const tailLen = 15 + s.speed * 25;
  const tailWaveAmp = 3 + s.speed * 6;

  // Cilia — continuous ramp: sparse at low speed, dense fringe at high speed
  const hasCilia = s.speed > 0.3;
  const ciliaCount = hasCilia ? Math.round(Math.max(3, s.speed * 10)) : 0;

  // Shell
  const hasShell = s.defense >= 1.0;
  const shellSegments = hasShell ? Math.max(2, Math.floor(s.defense * 1.8)) : 0;
  // Coverage: 50% at DEF 1 → 85% at DEF 4
  const shellCoverage = hasShell ? 0.5 + Math.min(1, (s.defense - 1) / 3) * 0.35 : 0;
  const membraneW = 1.5 + s.defense * 0.8 + Math.max(0, s.strength - 0.5) * 0.4;

  // Organelle count by tier
  let organelleCount;
  switch (tier) {
    case 'tiny': organelleCount = 0; break;
    case 'small': organelleCount = 2; break;
    case 'normal': organelleCount = Math.round(3 + s.size * 2); break;
    case 'large': organelleCount = Math.round(5 + s.size * 3); break;
    case 'huge': organelleCount = Math.round(8 + s.size * 3); break;
  }

  // Brain — size scales relative to body
  const brainBP = s.brainBP;
  const hasBrain = brainBP > 5;
  let brainFolds = 0;
  let brainSize = 0;
  if (brainBP > 5) {
    const brainFrac = 0.15 + ((brainBP - 5) / 45) * 0.30; // 15%–45% of rx
    brainSize = rx * brainFrac;
    brainFolds = Math.floor((brainBP - 5) / 5);
  }

  // Stomach — size scales relative to body
  const stomachFrac = 0.15 + ((s.stomach - 0.3) / 1.7) * 0.25; // 15%–40% of body
  const stomachSize = Math.min(rx, ry) * stomachFrac;
  const stomachFoodCount = Math.round(s.stomach * 5);

  return {
    baseR, rx, ry, tier,
    eyeR, eyeCount, eyeDetailLevel, viewAngleRad,
    mouthW, mouthH, mouthScale,
    tailCount, tailLen, tailWaveAmp,
    hasCilia, ciliaCount,
    hasShell, shellSegments, shellCoverage, membraneW,
    organelleCount,
    hasBrain, brainBP, brainSize, brainFolds,
    stomachSize, stomachFoodCount,
  };
}

// ============================================================
// BODY PATH GENERATION
// ============================================================

function buildBodyPath(g, s, t) {
  const pts = 64;
  const metaRate = s.metabolism; // 0.5–3.0

  // Low energy reduces breathing amplitude
  const energyBreatheMod = stateEnergy < 0.3 ? 0.3 + stateEnergy * 2.33 : 1;
  const breatheSpeed = 1 + metaRate * 2;
  const breatheAmp = (0.012 + metaRate * 0.008) * energyBreatheMod;
  const breathe = 1 + Math.sin(t * breatheSpeed) * breatheAmp;
  const points = [];

  // Speed streamlining: teardrop/torpedo shape. Back (left) narrows into a
  // pointed tail, front (right) tapers subtly, body elongates horizontally.
  const streamline = Math.max(0, (s.speed - 0.6) * 0.35); // 0 at ≤0.6, ~0.67 at 2.5

  // Fat reserves: wider body
  const fatFactor = traitFatReserves ? 0.85 + stateFatFill * 0.35 : 1;
  const fatRxFactor = traitFatReserves ? 1 + stateFatFill * 0.08 : 1;

  // Sexual repro: slight body shape shift
  const sexElongate = traitSexualRepro ? (traitSex === 'male' ? 1.05 : 1.0) : 1;
  const sexRound = traitSexualRepro ? (traitSex === 'female' ? 1.04 : 1.0) : 1;

  for (let i = 0; i < pts; i++) {
    const angle = (i / pts) * Math.PI * 2;
    let localRx = g.rx * fatRxFactor * sexElongate;
    let localRy = g.ry * fatFactor * sexRound;

    const cosA = Math.cos(angle);
    const sinA = Math.sin(angle);

    // Shoulder humps: bilateral bulges at ~±50° from front (facing right).
    // Creates a "broad shoulders" silhouette instead of a smooth oval.
    if (s.strength > 0.5) {
      const humpMag = (s.strength - 0.5) * 0.12; // radial scale factor
      const humpAng = 0.87; // ~50° from front
      const humpW = 0.4;    // angular width (radians)
      // Angular distance to each hump center (lower-front and upper-front)
      let d1 = Math.abs(angle - humpAng); // lower hump
      if (d1 > Math.PI) d1 = Math.PI * 2 - d1;
      let d2 = Math.abs(angle - (Math.PI * 2 - humpAng)); // upper hump
      if (d2 > Math.PI) d2 = Math.PI * 2 - d2;
      const bump = Math.exp(-d1 * d1 / (2 * humpW * humpW))
                 + Math.exp(-d2 * d2 / (2 * humpW * humpW));
      localRx *= 1 + bump * humpMag * Math.abs(cosA);
      localRy *= 1 + bump * humpMag;
    }

    // Omnivore lip bulge: small protrusion at front center for circle mouth
    if (s.diet >= 0.25 && s.diet < 0.65 && cosA > 0.7) {
      const lipStrength = smoothstep(0.7, 1.0, cosA);
      const mw = (8 + s.strength * 6) * Math.max(0.4, Math.min(1, g.rx / 45));
      localRx += lipStrength * mw * 0.35;
    }

    // Breathing pulse
    localRx *= breathe;
    localRy *= breathe;

    // Organic wobble — speed and amplitude scale with metabolism
    const wobbleSpd = 1.5 + metaRate * 0.8;
    const wobbleAmp = 0.012 + metaRate * 0.008;
    const wobble = 1 + Math.sin(angle * 5 + t * wobbleSpd * 1.3) * wobbleAmp
                     + Math.sin(angle * 3 + t * wobbleSpd) * (wobbleAmp * 0.7);

    // Metabolism ripple (continuous, intensity scales with metabolism)
    const rippleAmp = metaRate > 1.0 ? 0.005 * (metaRate - 1.0) * (metaRate - 1.0) : 0;
    const metaRipple = rippleAmp > 0 ? Math.sin(angle * 8 + t * (3 + metaRate * 2)) * rippleAmp : 0;

    let px = Math.cos(angle) * localRx * (wobble + metaRipple);
    let py = Math.sin(angle) * localRy * (wobble + metaRipple);

    // Speed streamlining: applied as post-process on the final point.
    // Elongates horizontally, tapers back into a point, slight front pinch.
    if (streamline > 0) {
      px *= 1 + streamline * 0.14; // elongate
      const xFrac = px / (g.rx * (1 + streamline * 0.14)); // normalized ~-1 to +1
      if (xFrac < 0) {
        // Back: narrow progressively toward the tail
        py *= 1 - (-xFrac) * streamline * 0.55;
      } else if (xFrac > 0.4) {
        // Front: subtle pinch near the nose
        py *= 1 - (xFrac - 0.4) * streamline * 0.25;
      }
    }

    points.push({ x: px, y: py });
  }
  return points;
}

function smoothstep(edge0, edge1, x) {
  const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
  return t * t * (3 - 2 * t);
}

function traceBodyPath(ctx, points) {
  ctx.beginPath();
  // Use quadratic curves for smoothness
  ctx.moveTo(
    (points[points.length - 1].x + points[0].x) / 2,
    (points[points.length - 1].y + points[0].y) / 2
  );
  for (let i = 0; i < points.length; i++) {
    const next = points[(i + 1) % points.length];
    const mx = (points[i].x + next.x) / 2;
    const my = (points[i].y + next.y) / 2;
    ctx.quadraticCurveTo(points[i].x, points[i].y, mx, my);
  }
  ctx.closePath();
}

// ============================================================
// DRAWING FUNCTIONS
// ============================================================

function drawBackground(ctx, w, h, biome) {
  const cx = w / 2, cy = h / 2;
  const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, w * 0.6);
  bgGrad.addColorStop(0, biome.bg2);
  bgGrad.addColorStop(1, biome.bg1);
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, w, h);

  // Ambient particles (drifting)
  ctx.globalAlpha = 0.2;
  for (let i = 0; i < 14; i++) {
    const seed = i * 137.5;
    const px = cx + Math.sin(seed + time * 0.08 * (i % 3 + 1)) * w * 0.4;
    const py = cy + Math.cos(seed * 0.7 + time * 0.06 * (i % 2 + 1)) * h * 0.4;
    const pr = 1 + (i % 3);
    ctx.fillStyle = biome.particle;
    ctx.beginPath();
    ctx.arc(px, py, pr, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// EXPLORE MODE — Biome Ambient, Pellets, Wandering
// ============================================================

function generateBiomeAmbient(biomeName) {
  const biome = BIOME_COLORS[biomeName];
  const count = biome.ambientCount;
  biomeAmbient = [];
  for (let i = 0; i < count; i++) {
    const base = {
      x: Math.random() * CANVAS_W,
      y: Math.random() * CANVAS_H,
      phase: Math.random() * Math.PI * 2,
      size: 1 + Math.random() * 3,
      speed: 0.2 + Math.random() * 0.6,
      rot: Math.random() * Math.PI * 2,
      opacity: 0.1 + Math.random() * 0.2,
    };
    // Biome-specific extras
    if (biomeName === 'forest') {
      base.size = 2 + Math.random() * 5;
      base.opacity = 0.12 + Math.random() * 0.18;
      base.elongation = 0.5 + Math.random() * 0.5;
    } else if (biomeName === 'desert') {
      base.size = 1.5 + Math.random() * 2.5;
      base.facets = 4 + Math.floor(Math.random() * 3); // 4-6 sided crystals
      base.highlight = Math.random() * 0.3;
    } else if (biomeName === 'wetland') {
      base.kind = i < count * 0.35 ? 'bubble' : (i < count * 0.65 ? 'silt' : 'organic');
      if (base.kind === 'bubble') {
        base.size = 2 + Math.random() * 4;
        base.riseSpeed = 15 + Math.random() * 25;
      } else if (base.kind === 'silt') {
        base.size = 0.5 + Math.random() * 1.5;
        base.driftX = (Math.random() - 0.5) * 8;
        base.driftY = (Math.random() - 0.5) * 8;
      } else {
        base.size = 2 + Math.random() * 3;
        base.elongation = 0.4 + Math.random() * 0.4;
      }
    } else if (biomeName === 'rocky') {
      base.kind = i < count * 0.6 ? 'fleck' : 'crystal';
      base.speed *= 0.3; // very slow
      if (base.kind === 'fleck') {
        base.size = 1.5 + Math.random() * 2.5;
      } else {
        base.size = 0.8 + Math.random() * 1.2;
        base.pulsePhase = Math.random() * Math.PI * 2;
      }
    }
    // grassland uses defaults (round particles, gentle drift)
    biomeAmbient.push(base);
  }
}

function drawBackgroundExplore(ctx, w, h, biomeName) {
  const biome = BIOME_COLORS[biomeName];
  const cx = w / 2, cy = h / 2;

  // Base radial gradient (same as designer mode)
  const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, w * 0.6);
  bgGrad.addColorStop(0, biome.bg2);
  bgGrad.addColorStop(1, biome.bg1);
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, w, h);

  // Render ambient elements per biome
  const t = time;

  if (biomeName === 'grassland') {
    // Gentle current flow lines
    ctx.strokeStyle = 'rgba(100,180,120,0.06)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
      const yy = h * 0.15 + (i / 5) * h * 0.7;
      ctx.beginPath();
      for (let x = 0; x < w; x += 4) {
        const wavY = yy + Math.sin(x * 0.015 + t * 0.4 + i * 1.2) * 12;
        x === 0 ? ctx.moveTo(x, wavY) : ctx.lineTo(x, wavY);
      }
      ctx.stroke();
    }
    // Drifting plant-like particles
    for (const p of biomeAmbient) {
      const px = (p.x + t * p.speed * 15) % w;
      const py = p.y + Math.sin(t * 0.5 + p.phase) * 8;
      ctx.globalAlpha = p.opacity;
      ctx.fillStyle = biome.particle;
      ctx.beginPath();
      ctx.arc(px, py, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

  } else if (biomeName === 'forest') {
    // Dense organic blobs
    for (const p of biomeAmbient) {
      const px = (p.x + Math.sin(t * 0.3 + p.phase) * 10) % w;
      const py = (p.y + Math.cos(t * 0.25 + p.phase * 0.7) * 8) % h;
      ctx.globalAlpha = p.opacity;
      ctx.fillStyle = biome.particle;
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(p.rot + t * 0.05);
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size, p.size * (p.elongation || 0.7), 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1;
    // Dark vignette overlay
    const vig = ctx.createRadialGradient(cx, cy, w * 0.15, cx, cy, w * 0.55);
    vig.addColorStop(0, 'rgba(10,20,10,0)');
    vig.addColorStop(1, 'rgba(10,20,10,0.35)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, w, h);

  } else if (biomeName === 'desert') {
    // Sparse mineral crystal shapes
    for (const p of biomeAmbient) {
      const px = p.x + Math.sin(t * 0.2 + p.phase) * 5;
      const py = p.y + Math.cos(t * 0.15 + p.phase) * 4;
      ctx.globalAlpha = 0.15 + p.highlight;
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(p.rot);
      ctx.fillStyle = 'rgba(200,170,100,0.3)';
      ctx.beginPath();
      const sides = p.facets || 5;
      for (let j = 0; j < sides; j++) {
        const a = (j / sides) * Math.PI * 2;
        const r = p.size * (0.7 + 0.3 * Math.cos(a * 2.5));
        j === 0 ? ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r) : ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
      }
      ctx.closePath();
      ctx.fill();
      // Faceted highlight
      ctx.fillStyle = 'rgba(255,230,180,0.2)';
      ctx.beginPath();
      ctx.arc(-p.size * 0.2, -p.size * 0.2, p.size * 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1;
    // Heat shimmer — faint undulating horizontal lines
    ctx.strokeStyle = 'rgba(200,150,60,0.04)';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 4; i++) {
      const yy = h * 0.2 + (i / 3) * h * 0.6;
      ctx.beginPath();
      for (let x = 0; x < w; x += 3) {
        const wavY = yy + Math.sin(x * 0.02 + t * 0.8 + i * 2.5) * 6;
        x === 0 ? ctx.moveTo(x, wavY) : ctx.lineTo(x, wavY);
      }
      ctx.stroke();
    }

  } else if (biomeName === 'wetland') {
    for (const p of biomeAmbient) {
      if (p.kind === 'bubble') {
        // Rising bubbles — wrap vertically
        const px = p.x + Math.sin(t * 0.4 + p.phase) * 6;
        const py = ((p.y - t * p.riseSpeed) % h + h) % h;
        ctx.globalAlpha = 0.15;
        ctx.strokeStyle = 'rgba(120,180,200,0.25)';
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.arc(px, py, p.size, 0, Math.PI * 2);
        ctx.stroke();
        // Highlight dot
        ctx.fillStyle = 'rgba(200,240,255,0.2)';
        ctx.beginPath();
        ctx.arc(px - p.size * 0.25, py - p.size * 0.25, p.size * 0.25, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.kind === 'silt') {
        // Suspended silt with brownian drift
        const px = (p.x + Math.sin(t * 0.6 + p.phase) * p.driftX + t * 2) % w;
        const py = (p.y + Math.cos(t * 0.5 + p.phase) * p.driftY) % h;
        ctx.globalAlpha = 0.2;
        ctx.fillStyle = 'rgba(140,120,80,0.35)';
        ctx.beginPath();
        ctx.arc(px < 0 ? px + w : px, py < 0 ? py + h : py, p.size, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // Drifting organic matter
        const px = (p.x + Math.sin(t * 0.2 + p.phase) * 15) % w;
        const py = (p.y + Math.cos(t * 0.15 + p.phase * 1.3) * 10) % h;
        ctx.globalAlpha = 0.1;
        ctx.fillStyle = 'rgba(80,120,60,0.25)';
        ctx.save();
        ctx.translate(px < 0 ? px + w : px, py < 0 ? py + h : py);
        ctx.rotate(p.rot + t * 0.08);
        ctx.beginPath();
        ctx.ellipse(0, 0, p.size, p.size * (p.elongation || 0.6), 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }
    ctx.globalAlpha = 1;

  } else if (biomeName === 'rocky') {
    for (const p of biomeAmbient) {
      if (p.kind === 'fleck') {
        // Angular mineral flecks — small rotated diamonds
        const px = p.x + Math.sin(t * 0.1 + p.phase) * 3;
        const py = p.y + Math.cos(t * 0.08 + p.phase) * 2;
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = 'rgba(160,155,145,0.3)';
        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(p.rot + t * 0.02);
        ctx.fillRect(-p.size * 0.5, -p.size * 0.3, p.size, p.size * 0.6);
        ctx.restore();
        // Subtle highlight on one edge
        ctx.fillStyle = 'rgba(200,200,195,0.12)';
        ctx.beginPath();
        ctx.arc(px + p.size * 0.2, py - p.size * 0.15, p.size * 0.2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // Crystalline highlight points — pulse slowly
        const px = p.x;
        const py = p.y;
        const pulse = 0.5 + 0.5 * Math.sin(t * 1.5 + p.pulsePhase);
        ctx.globalAlpha = 0.1 + pulse * 0.15;
        ctx.fillStyle = 'rgba(220,220,230,0.4)';
        ctx.beginPath();
        ctx.arc(px, py, p.size * (0.8 + pulse * 0.4), 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }
}

// --- Biome Pellets ---

function generateBiomePellets(biomeName) {
  const biome = BIOME_COLORS[biomeName];
  biomePellets = [];

  // Plant pellets — base 12, scaled by plantDensity
  const plantCount = Math.round(12 * biome.plantDensity);
  for (let i = 0; i < plantCount; i++) {
    biomePellets.push({
      x: 40 + Math.random() * (CANVAS_W - 80),
      y: 40 + Math.random() * (CANVAS_H - 80),
      size: (4 + Math.random() * 4) * biome.plantSize,
      elongation: 0.6 + Math.random() * 0.3,
      rot: Math.random() * Math.PI * 2,
      type: 'plant',
      phase: Math.random() * Math.PI * 2,
    });
  }

  // Meat pellets — 1-3
  const meatCount = 1 + Math.floor(Math.random() * 3);
  for (let i = 0; i < meatCount; i++) {
    biomePellets.push({
      x: 60 + Math.random() * (CANVAS_W - 120),
      y: 60 + Math.random() * (CANVAS_H - 120),
      size: 3 + Math.random() * 3,
      elongation: 0.5 + Math.random() * 0.4,
      rot: Math.random() * Math.PI * 2,
      type: 'meat',
      phase: Math.random() * Math.PI * 2,
    });
  }
}

function drawBiomePellets(ctx) {
  const dc = { h: 0, s: 0, l: 50 }; // neutral dc for plant/meat (not used for those types)
  for (const p of biomePellets) {
    const bobY = Math.sin(time * 0.8 + p.phase) * 2;
    drawSinglePellet(ctx, p.x, p.y + bobY, p.size, p.elongation, p.rot, p.type, 0.85, dc);
  }
}

// --- Organism Wandering ---

function updateWander(dt) {
  const biome = BIOME_COLORS[currentBiome];
  const baseSpeed = 30 * (getStats().speed / biome.movementCost);
  const pad = 80;

  orgWanderTimer -= dt;
  const dx = orgTargetX - orgX;
  const dy = orgTargetY - orgY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (orgWanderTimer <= 0 || dist < 5) {
    orgTargetX = pad + Math.random() * (CANVAS_W - pad * 2);
    orgTargetY = pad + Math.random() * (CANVAS_H - pad * 2);
    orgWanderTimer = 2 + Math.random() * 3;
  }

  if (dist > 1) {
    const moveX = (dx / dist) * baseSpeed * dt;
    const moveY = (dy / dist) * baseSpeed * dt;
    orgX += moveX;
    orgY += moveY;

    // Smooth angle interpolation toward movement direction
    const targetAngle = Math.atan2(dy, dx);
    let angleDiff = targetAngle - orgAngle;
    // Wrap to [-PI, PI]
    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
    orgAngle += angleDiff * Math.min(1, 4 * dt);
  }

  // Clamp to canvas
  orgX = Math.max(pad * 0.5, Math.min(CANVAS_W - pad * 0.5, orgX));
  orgY = Math.max(pad * 0.5, Math.min(CANVAS_H - pad * 0.5, orgY));
}

function enterExploreMode() {
  orgX = CANVAS_W / 2;
  orgY = CANVAS_H / 2;
  orgTargetX = CANVAS_W / 2;
  orgTargetY = CANVAS_H / 2;
  orgAngle = 0;
  orgWanderTimer = 0;
  generateBiomeAmbient(currentBiome);
  generateBiomePellets(currentBiome);
}

function exitExploreMode() {
  biomePellets = [];
  biomeAmbient = [];
}

function drawVisionCone(ctx, s, g) {
  const halfAngle = g.viewAngleRad / 2;
  // Cone extends from body edge outward — scales with organism size
  const coneLen = g.rx * (1 + s.viewRadius * 0.25);

  ctx.save();

  const dc = dietHSL(s.diet, s.metabolism);
  // Use a lightened, desaturated version so it's visible for all diet colors
  const coneH = dc.h;
  const coneS = Math.max(20, dc.s - 15);
  const coneL = Math.min(90, dc.l + 30);

  // Filled cone with visible gradient — fades from body edge outward
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.arc(0, 0, coneLen, -halfAngle, halfAngle);
  ctx.closePath();

  const vcGrad = ctx.createRadialGradient(0, 0, g.rx * 0.8, 0, 0, coneLen);
  vcGrad.addColorStop(0, hsla(coneH, coneS, coneL, 0.25));
  vcGrad.addColorStop(0.5, hsla(coneH, coneS, coneL, 0.12));
  vcGrad.addColorStop(1, hsla(coneH, coneS, coneL, 0));
  ctx.fillStyle = vcGrad;
  ctx.fill();

  // Edge lines along the cone boundary
  const ds = Math.max(0.5, g.rx / 45);
  ctx.strokeStyle = hsla(coneH, coneS, coneL, 0.35);
  ctx.lineWidth = 1 * ds;
  ctx.setLineDash([4 * ds, 4 * ds]);
  // Left edge
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(Math.cos(-halfAngle) * coneLen, Math.sin(-halfAngle) * coneLen);
  ctx.stroke();
  // Right edge
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(Math.cos(halfAngle) * coneLen, Math.sin(halfAngle) * coneLen);
  ctx.stroke();
  // Outer arc
  ctx.beginPath();
  ctx.arc(0, 0, coneLen, -halfAngle, halfAngle);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.restore();
}

function drawSensorRing(ctx, s, g) {
  // Sensor ring only draws when VR > 5 AND view angle < 300
  // (if view angle is nearly 360, the cone arc already forms a ring)
  if (s.viewRadius <= 5 || s.viewAngle >= 300) return;
  const ringR = g.rx * (1 + s.viewRadius * 0.25); // match cone length
  const dc = dietHSL(s.diet, s.metabolism);
  const ringL = Math.min(90, dc.l + 30);

  // Draw only the portion of the ring NOT covered by the vision cone
  const halfAngle = g.viewAngleRad / 2;
  ctx.save();
  ctx.strokeStyle = hsla(dc.h, Math.max(20, dc.s - 15), ringL, 0.15);
  const ds = Math.max(0.5, g.rx / 45);
  ctx.lineWidth = 0.8 * ds;
  ctx.setLineDash([3 * ds, 5 * ds]);
  ctx.beginPath();
  ctx.arc(0, 0, ringR, halfAngle, Math.PI * 2 - halfAngle);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawTails(ctx, s, g, t, animState) {
  const speedMult = animState === 'fleeing' ? 2 : 1;
  const ampMult = animState === 'fleeing' ? 1.5 : 1;
  const limpFactor = animState === 'burrowing' ? 0.15 : 1;
  const metaTailRate = 0.7 + s.metabolism * 0.5; // 1.05 at low → 2.2 at high
  const dc = dietColor(s.diet, s.metabolism);
  const parentAlpha = ctx.globalAlpha;

  for (let ti = 0; ti < g.tailCount; ti++) {
    // Fan tails vertically from left edge
    const spread = g.tailCount === 1 ? 0 : ((ti / (g.tailCount - 1)) - 0.5) * 0.7;
    const baseX = -g.rx;
    const baseY = spread * g.ry * 0.6;

    // Per-tail variation: each tail has slightly different length, speed, and phase
    const lenVar = 1 + Math.sin(ti * 2.37) * 0.15;     // ±15% length variation
    const speedVar = 1 + Math.sin(ti * 3.71) * 0.12;   // ±12% animation speed
    const ampVar = 1 + Math.sin(ti * 1.93) * 0.1;      // ±10% wave amplitude
    const phaseOff = ti * 1.5 + Math.sin(ti * 4.1) * 0.6; // irregular phase offset
    const tailLength = g.tailLen * lenVar;

    ctx.save();
    ctx.lineCap = 'round';

    // Glow trail behind fast tails (speed > 1.2)
    const glowIntensity = Math.max(0, (s.speed - 1.2) * 0.5);
    if (glowIntensity > 0) {
      const dc2 = dietHSL(s.diet, s.metabolism);
      ctx.strokeStyle = hsla(dc2.h, dc2.s + 15, dc2.l + 20, glowIntensity * 0.2);
      ctx.lineWidth = Math.max(3, 5 - ti * 0.5);
      ctx.beginPath();
      ctx.moveTo(baseX, baseY);
      const glowSegs = 12;
      for (let i = 1; i <= glowSegs; i++) {
        const frac = i / glowSegs;
        const x = baseX - tailLength * frac;
        const wave = Math.sin(t * 5 * metaTailRate * speedMult * speedVar + frac * Math.PI * 3 + phaseOff)
                     * g.tailWaveAmp * ampMult * ampVar * frac * limpFactor;
        ctx.lineTo(x, baseY + wave + spread * tailLength * 0.2 * frac);
      }
      ctx.stroke();
    }

    // Main tail stroke — thick base tapering to thin tip
    const baseWidth = Math.max(2, 3.5 + s.speed * 0.8 - ti * 0.4);
    const segs = 16;
    let prevX = baseX, prevY = baseY;
    for (let i = 1; i <= segs; i++) {
      const frac = i / segs;
      const x = baseX - tailLength * frac;
      const wave = Math.sin(t * 5 * metaTailRate * speedMult * speedVar + frac * Math.PI * 3 + phaseOff)
                   * g.tailWaveAmp * ampMult * ampVar * frac * limpFactor;
      const y = baseY + wave + spread * tailLength * 0.2 * frac;

      // Taper: thick at base (frac=0), thin at tip (frac=1)
      const segWidth = baseWidth * (1 - frac * 0.8);
      ctx.strokeStyle = dc;
      ctx.lineWidth = segWidth;
      ctx.globalAlpha = (0.85 - frac * 0.25) * parentAlpha;
      ctx.beginPath();
      ctx.moveTo(prevX, prevY);
      ctx.lineTo(x, y);
      ctx.stroke();

      prevX = x;
      prevY = y;
    }

    ctx.restore();
  }
}


function drawCilia(ctx, s, g, t, animState) {
  // Continuous cilia: sparse/short at low speed, dense/long at high speed.
  // Visible fringe at speed > 1.8.
  if (g.ciliaCount <= 0) return;
  const speedMult = animState === 'fleeing' ? 2 : 1;
  const dc = dietColor(s.diet, s.metabolism);
  const speedNorm = Math.min(1, s.speed / 2.5); // 0→1 across speed range

  ctx.save();
  ctx.strokeStyle = dc;
  ctx.lineCap = 'round';

  const bodyScale = Math.max(0.5, g.rx / 45);

  // Exclusion zones: skip cilia near mouth (angle ~0) and tail (angle ~PI)
  const ciliaMouthZone = 0.5; // ~29° from front
  const ciliaTailZone = 0.35; // ~20° from back

  for (let i = 0; i < g.ciliaCount; i++) {
    const angle = (i / g.ciliaCount) * Math.PI * 2;

    // Normalize to [-PI, PI] for zone check
    let normA = angle;
    if (normA > Math.PI) normA -= Math.PI * 2;
    if (Math.abs(normA) < ciliaMouthZone) continue; // skip mouth zone
    if (Math.abs(normA) > Math.PI - ciliaTailZone) continue; // skip tail zone

    const bx = Math.cos(angle) * g.rx;
    const by = Math.sin(angle) * g.ry;
    // Length scales with speed and body size
    const len = (4 + s.speed * 8) * bodyScale;
    const metaCiliaRate = 0.7 + s.metabolism * 0.5;
    const waveOff = Math.sin(t * 6 * metaCiliaRate * speedMult + i * 0.9) * (3 + s.speed * 3) * bodyScale;
    const mx = Math.cos(angle) * (g.rx + len * 0.6) + Math.cos(angle + Math.PI / 2) * waveOff;
    const my = Math.sin(angle) * (g.ry + len * 0.6) + Math.sin(angle + Math.PI / 2) * waveOff;
    const ex = Math.cos(angle) * (g.rx + len);
    const ey = Math.sin(angle) * (g.ry + len);

    ctx.lineWidth = (1.0 + speedNorm * 1.2) * bodyScale;
    ctx.globalAlpha = 0.35 + speedNorm * 0.4;

    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.quadraticCurveTo(mx, my, ex, ey);
    ctx.stroke();

  }
  ctx.restore();
}

function drawShell(ctx, s, g) {
  if (!g.hasShell) return;

  const dc = dietHSL(s.diet, s.metabolism);
  const def = s.defense;
  const shellArcHalf = g.shellCoverage * Math.PI;
  const startAngle = Math.PI - shellArcHalf;
  const endAngle = Math.PI + shellArcHalf;
  const arcPerSeg = (endAngle - startAngle) / g.shellSegments;

  // Shell thickness and opacity scale aggressively at high DEF
  const innerR = g.rx * (0.88 - def * 0.01);              // inner edge tightens slightly
  const outerR = g.rx * (1.0 + def * 0.1);                // outer edge pushes out more
  const plateAlpha = Math.min(0.9, 0.35 + def * 0.14);    // 0.49 at DEF 1 → 0.9 at DEF 4
  const highlightAlpha = Math.min(0.5, 0.15 + def * 0.08);
  const ridgeAlpha = Math.min(0.5, 0.15 + def * 0.1);

  ctx.save();
  for (let i = 0; i < g.shellSegments; i++) {
    const a0 = startAngle + i * arcPerSeg - arcPerSeg * 0.15;
    const a1 = startAngle + (i + 1) * arcPerSeg + arcPerSeg * 0.15;

    // Alternating shade for depth: even plates slightly lighter
    const shadeMod = (i % 2 === 0) ? 0 : -4;

    // Shell plate fill — accent-blended, shifts toward grey/brown at high DEF
    const shellH = accentMix(dc.h, 0.25); // 25% accent mix into shell
    const plateSat = Math.max(dc.s - def * 5, 15);
    const plateLight = dc.l - 12 - def * 2;
    ctx.beginPath();
    ctx.arc(0, 0, outerR, a0, a1);
    ctx.arc(0, 0, innerR, a1, a0, true);
    ctx.closePath();
    ctx.fillStyle = hsla(shellH, plateSat, plateLight + shadeMod, plateAlpha);
    ctx.fill();

    // Inner shadow (dark line along inner edge for depth)
    ctx.beginPath();
    ctx.arc(0, 0, innerR + 1, a0, a1);
    ctx.strokeStyle = hsla(dc.h, plateSat, plateLight - 12, plateAlpha * 0.6);
    ctx.lineWidth = 1 + def * 0.3;
    ctx.stroke();

    // Outer highlight edge
    ctx.beginPath();
    ctx.arc(0, 0, outerR, a0, a1);
    ctx.strokeStyle = hsla(dc.h, dc.s, dc.l + 20, highlightAlpha);
    ctx.lineWidth = 1.2 + def * 0.3;
    ctx.stroke();

    // Ridge lines between segments
    if (i > 0) {
      const ridgeAngle = startAngle + i * arcPerSeg;
      const rcos = Math.cos(ridgeAngle);
      const rsin = Math.sin(ridgeAngle);
      ctx.beginPath();
      ctx.moveTo(rcos * innerR, rsin * innerR);
      ctx.lineTo(rcos * outerR, rsin * outerR);
      ctx.strokeStyle = hsla(dc.h, plateSat, plateLight - 8, ridgeAlpha);
      ctx.lineWidth = 1 + def * 0.2;
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawBody(ctx, s, g, t, animState, bodyPoints) {
  const dc = dietHSL(s.diet, s.metabolism);

  // --- State effects on color ---
  // Energy: affects lightness
  const energyL = dc.l * (0.6 + stateEnergy * 0.4);
  // Health: reduces saturation, adds red tint
  const healthSatPenalty = (1 - stateHealth) * 15;
  // Maturity: young organisms are vivid/saturated, old organisms fade
  // maturity 0 (young) = full saturation (1.0), maturity 1 (old) = reduced (0.5)
  const matSatFactor = 1.0 - stateMaturity * 0.5;  // 1.0 → 0.5
  const effS = Math.max(10, (dc.s - healthSatPenalty) * matSatFactor);
  const effL = energyL;

  // Body gradient — accent hue blended strongly into midtones and edge
  const accentBlendH = accentMix(dc.h, 0.35); // 35% accent blend
  const accentEdgeH = accentMix(dc.h, 0.45);  // 45% at outer edge
  const bodyGrad = ctx.createRadialGradient(-g.rx * 0.15, -g.ry * 0.15, 0, 0, 0, Math.max(g.rx, g.ry));
  bodyGrad.addColorStop(0, hsl(dc.h, effS, effL + 18));
  bodyGrad.addColorStop(0.3, hsl(accentBlendH, effS, effL + 6));
  bodyGrad.addColorStop(0.6, hsl(dc.h, effS, effL));
  bodyGrad.addColorStop(0.85, hsl(accentEdgeH, Math.min(100, effS + 5), effL - 10));
  bodyGrad.addColorStop(1, hsl(dc.h, Math.min(100, effS + 10), effL - 18));

  // Burrowing: opacity handled at drawOrganism level
  if (animState === 'burrowing') {
    ctx.save();
  }

  // Fleeing: paler color
  traceBodyPath(ctx, bodyPoints);
  if (animState === 'fleeing') {
    const paleGrad = ctx.createRadialGradient(-g.rx * 0.15, -g.ry * 0.15, 0, 0, 0, Math.max(g.rx, g.ry));
    paleGrad.addColorStop(0, hsl(dc.h, Math.max(20, effS - 20), effL + 15));
    paleGrad.addColorStop(0.6, hsl(dc.h, Math.max(20, effS - 15), effL + 8));
    paleGrad.addColorStop(1, hsl(dc.h, effS, effL - 10));
    ctx.fillStyle = paleGrad;
  } else {
    ctx.fillStyle = bodyGrad;
  }
  ctx.fill();

  // Health < 0.8: red tint overlay (starts subtle, gets very strong)
  if (stateHealth < 0.8) {
    const redIntensity = (0.8 - stateHealth) / 0.8; // 0 → 1
    const redAlpha = redIntensity * 0.35;
    traceBodyPath(ctx, bodyPoints);
    ctx.fillStyle = hsla(0, 70, 40, redAlpha);
    ctx.fill();

    // Pulsing red outline at low health
    if (stateHealth < 0.6) {
      const pulse = 0.5 + Math.sin(t * 4) * 0.5;
      const outlineAlpha = (0.6 - stateHealth) * 0.8 * pulse;
      traceBodyPath(ctx, bodyPoints);
      ctx.strokeStyle = hsla(0, 80, 50, outlineAlpha);
      ctx.lineWidth = g.membraneW + 2;
      ctx.stroke();
    }
  }

  // Health < 0.5: visible wound marks (dark gashes + lighter edges)
  if (stateHealth < 0.5) {
    const scratchCount = Math.min(6, Math.floor((0.5 - stateHealth) * 12) + 2);
    ctx.save();
    traceBodyPath(ctx, bodyPoints);
    ctx.clip();

    const ms = Math.max(0.5, g.rx / 45);
    for (let i = 0; i < scratchCount; i++) {
      const sx = (Math.sin(i * 4.7 + 0.3) * 0.55) * g.rx;
      const sy = (Math.cos(i * 3.1 + 0.7) * 0.55) * g.ry;
      const len = g.rx * (0.15 + Math.sin(i * 2.3) * 0.1);
      const angle = i * 1.2 + 0.5;
      const cx = Math.cos(angle);
      const cy = Math.sin(angle);

      // Dark gash
      ctx.strokeStyle = hsla(0, 40, 18, 0.5);
      ctx.lineWidth = 2.5 * ms;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(sx - cx * len * 0.5, sy - cy * len * 0.5);
      ctx.lineTo(sx + cx * len * 0.5, sy + cy * len * 0.5);
      ctx.stroke();

      // Red edge highlight
      ctx.strokeStyle = hsla(0, 70, 40, 0.3);
      ctx.lineWidth = 1 * ms;
      ctx.beginPath();
      ctx.moveTo(sx - cx * len * 0.5 + cy * 1.5, sy - cy * len * 0.5 - cx * 1.5);
      ctx.lineTo(sx + cx * len * 0.5 + cy * 1.5, sy + cy * len * 0.5 - cx * 1.5);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Health < 0.3: desaturation overlay (grey wash)
  if (stateHealth < 0.3) {
    const greyAlpha = (0.3 - stateHealth) * 0.5;
    traceBodyPath(ctx, bodyPoints);
    ctx.fillStyle = `rgba(80, 80, 80, ${greyAlpha})`;
    ctx.fill();
  }

  // High energy glow (>0.8)
  if (stateEnergy > 0.8) {
    const glowA = (stateEnergy - 0.8) * 0.5;
    const glow = ctx.createRadialGradient(0, 0, g.rx * 0.6, 0, 0, g.rx * 1.3);
    glow.addColorStop(0, hsla(dc.h, effS, effL + 20, 0));
    glow.addColorStop(0.7, hsla(dc.h, effS, effL + 25, glowA * 0.15));
    glow.addColorStop(1, hsla(dc.h, effS, effL + 30, 0));
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.ellipse(0, 0, g.rx * 1.3, g.ry * 1.3, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Front-half darkening gradient for STR (muscular weight)
  if (s.strength > 0.5) {
    const strAlpha = Math.min(0.18, (s.strength - 0.5) * 0.06);
    const darkGrad = ctx.createLinearGradient(-g.rx, 0, g.rx * 1.1, 0);
    darkGrad.addColorStop(0, 'rgba(0,0,0,0)');
    darkGrad.addColorStop(0.35, 'rgba(0,0,0,0)');
    darkGrad.addColorStop(1, `rgba(0,0,0,${strAlpha})`);
    traceBodyPath(ctx, bodyPoints);
    ctx.fillStyle = darkGrad;
    ctx.fill();
  }

  // Accent markings — visible secondary color pattern on body
  {
    ctx.save();
    traceBodyPath(ctx, bodyPoints);
    ctx.clip();
    const speckH = accentHue;

    // Larger accent patches
    for (let i = 0; i < 6; i++) {
      const sx = (Math.sin(i * 5.3 + 1.2) * 0.6) * g.rx;
      const sy = (Math.cos(i * 7.1 + 0.7) * 0.55) * g.ry;
      const sr = (4 + Math.sin(i * 2.1) * 3) * Math.max(0.5, g.rx / 42);
      const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr);
      grad.addColorStop(0, hsla(speckH, 55, 58, 0.22));
      grad.addColorStop(0.5, hsla(speckH, 50, 55, 0.1));
      grad.addColorStop(1, hsla(speckH, 45, 50, 0));
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(sx, sy, sr, 0, Math.PI * 2);
      ctx.fill();
    }

    // Accent-tinted rim shimmer along body edge
    traceBodyPath(ctx, bodyPoints);
    ctx.strokeStyle = hsla(speckH, 50, 60, 0.15);
    ctx.lineWidth = g.membraneW * 0.8;
    ctx.stroke();

    ctx.restore();
  }

  // Membrane stroke (thicker with STR + DEF)
  traceBodyPath(ctx, bodyPoints);
  ctx.strokeStyle = hsl(dc.h, effS + 10, effL - 18);
  ctx.lineWidth = g.membraneW;
  ctx.stroke();

  // Muscle fiber lines (STR > 0.8): curved strokes inside body, clipped
  if (s.strength > 0.8) {
    const fiberCount = Math.min(4, Math.floor((s.strength - 0.8) * 1.8) + 1);
    const fiberAlpha = Math.min(0.22, (s.strength - 0.8) * 0.08);
    ctx.save();
    traceBodyPath(ctx, bodyPoints);
    ctx.clip();
    ctx.strokeStyle = hsla(dc.h, dc.s + 10, dc.l - 18, fiberAlpha);
    ctx.lineWidth = 1.3;
    ctx.lineCap = 'round';
    for (let fi = 0; fi < fiberCount; fi++) {
      const frac = (fi + 0.5) / fiberCount;
      const y0 = (frac - 0.5) * g.ry * 1.6;
      // Fibers arc from mid-body toward the front, converging
      ctx.beginPath();
      ctx.moveTo(-g.rx * 0.2, y0);
      ctx.bezierCurveTo(
        g.rx * 0.1, y0 * 0.85,
        g.rx * 0.4, y0 * 0.5,
        g.rx * 0.75, y0 * 0.2
      );
      ctx.stroke();
    }
    ctx.restore();
  }

  if (animState === 'burrowing') ctx.restore();
}

function drawInternals(ctx, s, g, t, animState, bodyPoints) {
  const dc = dietHSL(s.diet, s.metabolism);
  const driftSpeed = 0.15 + s.metabolism * 0.6;
  const glowFreq = s.metabolism * 3;

  // Clip to body
  ctx.save();
  traceBodyPath(ctx, bodyPoints);
  ctx.clip();


  // Inner glow (pulsing with metabolism — brighter and faster at high meta)
  const glowAmp = 0.2 + s.metabolism * 0.1; // 0.25 at low → 0.5 at high
  const glowPulse = (1 - glowAmp) + Math.sin(t * glowFreq) * glowAmp;
  const glowBright = 0.15 + s.metabolism * 0.06; // 0.18 at low → 0.33 at high
  const innerGlow = ctx.createRadialGradient(-3, -3, 0, 0, 0, g.rx * 0.6);
  innerGlow.addColorStop(0, hsla(dc.h, dc.s, dc.l + 20, glowBright * glowPulse));
  innerGlow.addColorStop(1, hsla(dc.h, dc.s, dc.l, 0));
  ctx.fillStyle = innerGlow;
  ctx.beginPath();
  ctx.ellipse(0, 0, g.rx * 0.65, g.ry * 0.65, 0, 0, Math.PI * 2);
  ctx.fill();

  // Organelles (drifting)
  if (g.organelleCount > 0) {
    ctx.globalAlpha = 0.18;
    for (let i = 0; i < g.organelleCount; i++) {
      const ox = Math.sin(i * 2.3 + t * driftSpeed) * g.rx * 0.4;
      const oy = Math.cos(i * 3.1 + t * driftSpeed * 0.7) * g.ry * 0.35;
      const or = 3 + s.size * 2.5;
      ctx.fillStyle = hsl(dc.h, dc.s - 5, dc.l + 15);
      ctx.beginPath();
      ctx.ellipse(ox, oy, or, or * 0.65, i * 0.7 + t * 0.08, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Internal channels for huge tier
    if (g.tier === 'huge') {
      ctx.save();
      ctx.strokeStyle = hsla(dc.h, dc.s, dc.l + 10, 0.1);
      ctx.lineWidth = 1.5;
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        const sx = Math.sin(i * 1.7) * g.rx * 0.3;
        const sy = Math.cos(i * 2.1) * g.ry * 0.3;
        const ex = Math.sin(i * 1.7 + 2) * g.rx * 0.4;
        const ey = Math.cos(i * 2.1 + 2) * g.ry * 0.4;
        ctx.moveTo(sx, sy);
        ctx.quadraticCurveTo(0, 0, ex, ey);
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  // Stomach organ (internal, NOT body shape)
  drawStomachOrgan(ctx, s, g, t);

  // Brain organelle
  if (g.hasBrain) {
    drawBrainOrgan(ctx, s, g, t);
  }


  ctx.restore(); // end clip
}

function drawStomachOrgan(ctx, s, g, t) {
  const dc = dietHSL(s.diet, s.metabolism);
  const lineScale = Math.max(0.5, g.rx / 50);

  // Adaptive position: push forward when brain is large, center when no brain
  const brainPush = g.hasBrain ? g.brainSize / g.rx * 0.2 : 0;
  const stX = g.rx * (0.05 + brainPush);
  const stY = g.ry * 0.05;
  const size = g.stomachSize;

  // Peristaltic animation — slow squeeze cycle
  const peristalsis = Math.sin(t * 1.2) * 0.1;
  const stW = size * (0.85 - peristalsis);
  const stH = size * (1.0 + peristalsis);

  // Stomach hue: shifted toward warm amber (independent of diet)
  const stomH = 35;   // warm amber
  const stomS = 55;
  const stomL = 50;

  ctx.save();

  // --- Outer glow (warm amber) ---
  const glowPulse = 1 + Math.sin(t * 1.5) * 0.15;
  const glowAlpha = 0.15 + (s.stomach / 2) * 0.2;
  const glowR = Math.max(stW, stH) * 1.8;
  const glow = ctx.createRadialGradient(stX, stY, size * 0.15, stX, stY, glowR);
  glow.addColorStop(0, hsla(stomH, stomS + 10, stomL + 20, glowAlpha * glowPulse));
  glow.addColorStop(0.4, hsla(stomH, stomS, stomL + 10, glowAlpha * 0.4 * glowPulse));
  glow.addColorStop(1, hsla(stomH, stomS - 10, stomL, 0));
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(stX, stY, glowR, 0, Math.PI * 2);
  ctx.fill();

  // --- Stomach sac (clearly visible, warm glow) ---
  const sacGrad = ctx.createRadialGradient(stX, stY, 0, stX, stY, Math.max(stW, stH));
  sacGrad.addColorStop(0, hsla(stomH, stomS + 5, stomL + 15, 0.55));
  sacGrad.addColorStop(0.5, hsla(stomH, stomS, stomL + 5, 0.35));
  sacGrad.addColorStop(1, hsla(stomH, stomS - 10, stomL - 5, 0.12));
  ctx.fillStyle = sacGrad;
  ctx.beginPath();
  ctx.ellipse(stX, stY, stW, stH, 0, 0, Math.PI * 2);
  ctx.fill();

  // --- Food particles: type-based color, dissolving as they digest ---
  // Food color depends on what the organism EATS (its diet preference)
  // diet 0 = eats plants (green), diet 1 = eats meat (red)
  const plantHue = 110;  // green food
  const meatHue = 5;     // red/brown food
  const mixHue = 45;     // yellow-brown food

  const foodCount = g.stomachFoodCount;
  for (let i = 0; i < foodCount; i++) {
    const seed = i * 2.7;
    // Digestion progress: particle 0 = freshest, higher = more digested
    const digestFrac = i / Math.max(1, foodCount - 1); // 0 = fresh, 1 = fully digested

    // Churning orbit
    const orbitSpeed = 0.3 + (i % 3) * 0.1;
    const fx = stX + Math.sin(seed + t * orbitSpeed) * stW * 0.55;
    const fy = stY + Math.cos(seed * 1.3 + t * orbitSpeed * 0.8) * stH * 0.5;

    // Size shrinks as food digests
    const freshR = (2.5 + s.stomach * 1.5) * lineScale;
    const particleR = freshR * (1.0 - digestFrac * 0.6); // shrinks to 40% of original

    // Color by food type — mixed organisms get varied particles
    let foodHue;
    if (s.diet < 0.25) {
      foodHue = plantHue + (i % 3) * 6;          // green food bits
    } else if (s.diet > 0.75) {
      foodHue = meatHue + (i % 3) * 4;            // red/brown meat bits
    } else {
      foodHue = (i % 2 === 0) ? plantHue : meatHue; // mixed diet: alternating
    }
    // More digested = duller + more transparent
    const foodSat = 65 - digestFrac * 25;
    const foodLit = 55 - digestFrac * 10;
    const foodAlpha = 0.6 - digestFrac * 0.25 + Math.sin(t * 2 + seed) * 0.08;

    // Soft food blob with glow
    const fGrad = ctx.createRadialGradient(fx, fy, 0, fx, fy, particleR);
    fGrad.addColorStop(0, hsla(foodHue, foodSat, foodLit, foodAlpha));
    fGrad.addColorStop(0.7, hsla(foodHue, foodSat - 10, foodLit - 5, foodAlpha * 0.5));
    fGrad.addColorStop(1, hsla(foodHue, foodSat - 15, foodLit - 10, 0));
    ctx.fillStyle = fGrad;
    ctx.beginPath();
    ctx.arc(fx, fy, particleR, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- Eating animation: food arriving from mouth + digestion glow ---
  if (currentAnimState === 'eating') {
    const eatCycle = (animStateTime % 2.5) / 2.5;
    // Incoming food blob from mouth direction
    if (eatCycle < 0.35) {
      const arriveT = eatCycle / 0.35;
      const inX = stX + (g.rx * 0.45 - stX) * (1 - arriveT);
      const inY = stY * arriveT;
      const inAlpha = 0.65 * (1 - arriveT * 0.4);
      const inR = (3.5 + s.stomach) * lineScale;
      const inHue = s.diet < 0.25 ? plantHue : s.diet > 0.75 ? meatHue : mixHue;
      const iGrad = ctx.createRadialGradient(inX, inY, 0, inX, inY, inR);
      iGrad.addColorStop(0, hsla(inHue, 65, 58, inAlpha));
      iGrad.addColorStop(1, hsla(inHue, 55, 48, 0));
      ctx.fillStyle = iGrad;
      ctx.beginPath();
      ctx.arc(inX, inY, inR, 0, Math.PI * 2);
      ctx.fill();
    }
    // Digestion glow pulse
    if (eatCycle > 0.4 && eatCycle < 0.75) {
      const digestGlow = Math.sin((eatCycle - 0.4) / 0.35 * Math.PI);
      ctx.fillStyle = hsla(stomH, stomS + 10, stomL + 25, 0.15 * digestGlow);
      ctx.beginPath();
      ctx.ellipse(stX, stY, stW * 1.15, stH * 1.15, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // --- White edge halo ---
  const haloAlpha = 0.1 + (s.stomach / 2) * 0.12;
  const haloPulse = 1 + Math.sin(t * 1.8) * 0.12;
  const haloR = Math.max(stW, stH) * 1.08;
  const halo = ctx.createRadialGradient(stX, stY, Math.max(stW, stH) * 0.55, stX, stY, haloR);
  halo.addColorStop(0, hsla(stomH + 15, 25, 92, 0));
  halo.addColorStop(0.65, hsla(stomH + 15, 30, 90, haloAlpha * 0.5 * haloPulse));
  halo.addColorStop(1, hsla(stomH + 15, 25, 88, 0));
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.arc(stX, stY, haloR, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawBrainOrgan(ctx, s, g, t) {
  const bp = s.brainBP;
  const size = g.brainSize;

  // Position: back-center of body (left side, centered vertically)
  const bx = -g.rx * 0.28;
  const by = 0;

  // Fixed cyan-blue palette — always contrasts with diet hue
  const H = 210, S = 80, L = 60;

  // --- PHASE 1: Outer glow aura (body coords) — bright and unmissable ---
  const glowIntensity = 0.15 + (bp / 50) * 0.45;
  const glowPulse = 1 + Math.sin(t * 2) * 0.2;
  const glowR = size * (2.0 + (bp / 50) * 1.2);
  const glow = ctx.createRadialGradient(bx, by, size * 0.1, bx, by, glowR);
  glow.addColorStop(0, hsla(190, 95, 78, glowIntensity * glowPulse));
  glow.addColorStop(0.35, hsla(200, 90, 68, glowIntensity * 0.45 * glowPulse));
  glow.addColorStop(1, hsla(H, 70, 50, 0));
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(bx, by, glowR, 0, Math.PI * 2);
  ctx.fill();

  const lineScale = Math.max(0.5, g.rx / 50); // scale line widths with body

  // --- PHASE 2: Brain core — drifting neural-node cluster ---
  // No hard outline. Shape emerges from overlapping soft glowing nodes.
  ctx.save();
  ctx.translate(bx, by);

  const nodeCount = 3 + Math.floor(g.brainFolds * 0.7);

  // Each node drifts on its own slow orbit
  for (let i = 0; i < nodeCount; i++) {
    const orbitR = size * (0.1 + (i / nodeCount) * 0.5);
    const orbitSpeed = 0.18 + (i % 3) * 0.07;
    const orbitPhase = i * 2.39996; // golden angle for even spread
    const nx = Math.cos(orbitPhase + t * orbitSpeed) * orbitR;
    const ny = Math.sin(orbitPhase + t * orbitSpeed) * orbitR * 0.7;
    // Node radius breathes independently
    const nodeR = size * (0.3 + 0.06 * Math.sin(i * 1.7 + t * 0.9));

    const grad = ctx.createRadialGradient(nx, ny, 0, nx, ny, nodeR);
    grad.addColorStop(0,   hsla(195, S + 10, L + 18, 0.40));
    grad.addColorStop(0.5, hsla(H, S, L + 5, 0.18));
    grad.addColorStop(1,   hsla(H + 10, S - 5, L, 0));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(nx, ny, nodeR, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- PHASE 4: Bright pulsing core (the "jewel") ---
  const hlPulse = 0.6 + Math.sin(t * 2.5) * 0.25;
  const coreR = size * 0.55;
  const hl = ctx.createRadialGradient(0, 0, 0, 0, 0, coreR);
  hl.addColorStop(0,   hsla(185, 95, 90, 0.6 * hlPulse));
  hl.addColorStop(0.3, hsla(195, 92, 78, 0.25 * hlPulse));
  hl.addColorStop(1,   hsla(H, 80, 60, 0));
  ctx.fillStyle = hl;
  ctx.beginPath();
  ctx.arc(0, 0, coreR, 0, Math.PI * 2);
  ctx.fill();

  // --- PHASE 5: White edge halo around the cluster ---
  const haloAlpha = 0.12 + (bp / 50) * 0.18;
  const haloPulse = 1 + Math.sin(t * 2.2) * 0.15;
  const haloR = size * 1.05;
  const halo = ctx.createRadialGradient(0, 0, size * 0.6, 0, 0, haloR);
  halo.addColorStop(0, hsla(190, 30, 95, 0));
  halo.addColorStop(0.7, hsla(190, 40, 92, haloAlpha * 0.6 * haloPulse));
  halo.addColorStop(1, hsla(200, 30, 90, 0));
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.arc(0, 0, haloR, 0, Math.PI * 2);
  ctx.fill();

  // --- PHASE 6: Neural sparkles (BP > 20) ---
  if (bp > 20) {
    const sparkCount = Math.floor((bp - 20) / 4);
    for (let i = 0; i < sparkCount; i++) {
      const sa = i * 2.39996 + t * 1.5;
      const sd = size * (0.2 + (i % 3) * 0.18);
      const sx = Math.cos(sa) * sd * 0.9;
      const sy = Math.sin(sa) * sd * 0.6;
      const sparkle = 0.3 + Math.sin(t * 6 + i * 2.1) * 0.35;
      ctx.fillStyle = hsla(185, 95, 87, sparkle);
      ctx.beginPath();
      ctx.arc(sx, sy, 1.3 * lineScale, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.restore();
}

function drawEyes(ctx, s, g, t, animState) {
  // ---------------------------------------------------------------
  // Eye placement: evenly spaced angles centered on facing direction.
  // Always perfectly symmetric above/below the centerline (x-axis).
  // Eyes near the mouth are pushed to a shallower depth inside the
  // body so they sit behind it rather than overlapping.
  // ---------------------------------------------------------------
  const halfViewArc = g.viewAngleRad / 2;
  const maxSpread = Math.PI * 0.42; // clamp to ~75° from facing
  const effectiveHalfArc = Math.min(halfViewArc, maxSpread);

  // Dead zone: angular radius around the mouth where eyes get pushed back.
  // Based on the mouth's vertical extent + margin, seen from the eye depth.
  const deadZone = Math.max(0.35, Math.atan2(g.mouthH * 1.2 + 4, g.rx * 0.6));

  // Evenly distribute eyes from -effectiveHalfArc to +effectiveHalfArc
  const eyeAngles = [];
  if (g.eyeCount === 1) {
    eyeAngles.push(0);
  } else {
    for (let i = 0; i < g.eyeCount; i++) {
      eyeAngles.push(-effectiveHalfArc + (2 * effectiveHalfArc) * i / (g.eyeCount - 1));
    }
  }

  // ---------------------------------------------------------------
  // Eye properties
  // ---------------------------------------------------------------
  const blinkScale = Math.max(0, 1 - blinkProgress);
  const pupilDilation = animState === 'fleeing' ? 1.4 : 1.0;
  const er = g.eyeR; // capped at 12 in computeGeometry
  const detail = g.eyeDetailLevel;
  const irisC = irisColor(s.diet);

  // Per-eye depth: eyes near the mouth (within deadZone) are pushed to a
  // shallower depth so they sit behind it. Eyes outside the deadZone use
  // normal depth (0.68). Depth lerps from 0.5 (at angle 0) to 0.68.
  for (const angle of eyeAngles) {
    const proximity = Math.min(1, Math.abs(angle) / deadZone); // 0=at mouth, 1+=outside
    const eyeDepth = 0.5 + proximity * 0.18; // 0.5 (behind mouth) → 0.68 (normal)
    const ex = Math.cos(angle) * g.rx * eyeDepth;
    const ey = Math.sin(angle) * g.ry * eyeDepth;

    ctx.save();
    ctx.translate(ex, ey);

    // ----- Sclera: rotated 90° (wider than tall), smooth diet transition -----
    const d = s.diet;
    // Herbivore: big round friendly. Carnivore: wider, narrower (slit-like)
    let scleraRx = er * (1.15 + d * 0.05);   // 1.15 → 1.20
    let scleraRy = er * (1.1 - d * 0.2);     // 1.1  → 0.9
    scleraRy *= blinkScale;

    const outlineW = Math.max(1, er * 0.1 + detail * 0.3);
    const outlineDark = 0.17 + d * 0.25; // darker outline for carnivores

    // Sclera — bright white so it pops against any body color
    ctx.fillStyle = '#fafaf2';
    ctx.strokeStyle = `rgba(${Math.round(34 + (1-d)*34)}, ${Math.round(34 + (1-d)*34)}, ${Math.round(34 + (1-d)*34)}, 1)`;
    ctx.lineWidth = outlineW;
    ctx.beginPath();
    ctx.ellipse(0, 0, scleraRx, Math.max(0.5, scleraRy), 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Detail: glow ring for high VR
    if (detail > 2) {
      const glowA = Math.min(0.25, (detail - 2) * 0.08);
      ctx.save();
      ctx.strokeStyle = hsla(irisC.h, irisC.s + 10, irisC.l + 25, glowA);
      ctx.lineWidth = 2 + detail * 0.5;
      ctx.beginPath();
      ctx.ellipse(0, 0, scleraRx + 3, Math.max(2, scleraRy + 3), 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    if (blinkScale > 0.25) {
      const trackX = Math.sin(t * 0.5) * er * 0.1;
      const trackY = Math.cos(t * 0.7) * er * 0.06;

      // ----- Iris: smooth size transition -----
      const irisR = er * (0.55 - d * 0.08);   // 0.55 → 0.47
      const irisLightBoost = detail * 3;
      ctx.fillStyle = hsl(irisC.h, irisC.s + detail * 2, irisC.l + irisLightBoost);
      ctx.beginPath();
      ctx.arc(trackX, trackY, irisR, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = hsl(irisC.h, irisC.s + 10, irisC.l - 15);
      ctx.lineWidth = 0.6 + detail * 0.1;
      ctx.stroke();

      // Detail: inner iris ring
      if (detail > 1) {
        ctx.strokeStyle = hsla(irisC.h, irisC.s + 5, irisC.l + 8, 0.3);
        ctx.lineWidth = 0.4;
        ctx.beginPath();
        ctx.arc(trackX, trackY, irisR * 0.72, 0, Math.PI * 2);
        ctx.stroke();
      }

      // ----- Pupil: superellipse transition -----
      // diet 0 = goat rectangle (narrow horiz, tall vert on screen)
      // diet 0.5 = round
      // diet 1 = cat slit (wide horiz, narrow vert on screen)
      ctx.fillStyle = '#0a0a0a';
      const pupilRx = er * (0.10 + d * 0.28) * pupilDilation;  // 0.10 → 0.38
      const pupilRy = er * (0.38 - d * 0.28) * pupilDilation;  // 0.38 → 0.10
      // Superellipse exponent: boxy at diet 0, elliptical at diet >= 0.5
      const sn = 2 + Math.max(0, 1 - d * 2) * 3; // 5 → 2
      ctx.beginPath();
      const pSteps = 36;
      for (let pi = 0; pi <= pSteps; pi++) {
        const theta = (pi / pSteps) * Math.PI * 2;
        const ct = Math.cos(theta), st = Math.sin(theta);
        const px = trackX + pupilRx * Math.sign(ct) * Math.pow(Math.abs(ct), 2 / sn);
        const py = trackY + pupilRy * Math.sign(st) * Math.pow(Math.abs(st), 2 / sn);
        if (pi === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();

      // ----- Highlights (Spore-style) -----
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(er * 0.18, -er * 0.22, er * 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(-er * 0.12, er * 0.15, er * 0.1, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }
}

function drawMouth(ctx, s, g, t, animState) {
  // Mouth sits at the right edge of the body (front).
  // Compute actual body edge at angle 0 from shoulder-hump formula.
  let edgeRx = g.rx;
  if (s.strength > 0.5) {
    const hm = (s.strength - 0.5) * 0.12;
    const d = 0.87; // hump center distance from angle 0
    const bump = 2 * Math.exp(-d * d / (2 * 0.4 * 0.4));
    edgeRx *= 1 + bump * hm;
  }
  // Omnivore circle mouth: push forward so it doesn't crowd eyes
  const isCircleMouth = s.diet >= 0.25 && s.diet < 0.65;
  const lipProtrusion = isCircleMouth ? g.mouthW * 0.35 : 0;
  const mouthX = edgeRx + lipProtrusion;
  const mouthY = 0;
  const mw = g.mouthW;
  const mh = g.mouthH;
  const dc = dietHSL(s.diet, s.metabolism);

  // Eating/attacking animation: 0→1→0 open/close cycle
  let openFactor = 0;
  if (animState === 'eating') {
    const cycle = (animStateTime % 2.0) / 2.0;
    if (cycle < 0.35) {
      openFactor = Math.sin(cycle / 0.35 * Math.PI);
    }
  } else if (animState === 'attacking') {
    // Wide jaw snap during lunge
    const cycle = (animStateTime % 1.5) / 1.5;
    if (cycle < 0.18) {
      openFactor = Math.sin(cycle / 0.18 * Math.PI) * 1.3; // extra wide
    }
  }

  ctx.save();

  if (s.diet < 0.25) {
    // ===== FILTER CILIA =====
    // Waving tentacles projecting rightward from the body edge.
    const ms = g.mouthScale;
    const tentacleCount = Math.min(8, 5 + Math.floor(s.strength));
    // Cap spread to body height so tentacles stay connected
    const totalSpread = Math.min(mh * 3.5, g.ry * 1.6);
    ctx.lineCap = 'round';

    for (let i = 0; i < tentacleCount; i++) {
      const frac = tentacleCount === 1 ? 0 : (i / (tentacleCount - 1)) - 0.5;
      const baseY = mouthY + frac * totalSpread;
      // Compute actual body edge at this Y position (ellipse)
      const yRatio = Math.min(0.99, Math.abs(baseY) / g.ry);
      const bodyEdgeAtY = g.rx * Math.sqrt(1 - yRatio * yRatio);
      // Start tentacle at body edge
      const startX = Math.max(bodyEdgeAtY - 2 * ms, mouthX - 5 * ms);

      const wave = Math.sin(t * 3 + i * 0.9) * (5 + s.speed * 3) * ms;
      const pulse = 1 + Math.sin(t * 2 + i * 0.5) * 0.1;
      const len = (10 + s.strength * 6 + openFactor * 8) * ms * pulse;

      const alpha = 0.5 + 0.2 * Math.sin(t * 1.5 + i);
      ctx.strokeStyle = hsla(dc.h, dc.s, dc.l + 5, alpha);
      ctx.lineWidth = (2.4 - Math.abs(frac) * 1.2) * ms;
      ctx.beginPath();
      ctx.moveTo(startX, baseY);
      ctx.bezierCurveTo(
        startX + len * 0.3, baseY + wave * 0.6,
        startX + len * 0.7, baseY + wave,
        startX + len, baseY + wave * 0.3
      );
      ctx.stroke();

      // Rounded tip blob
      ctx.fillStyle = hsla(dc.h, dc.s, dc.l + 20, 0.55);
      ctx.beginPath();
      ctx.arc(startX + len, baseY + wave * 0.3, 2.2 * ms, 0, Math.PI * 2);
      ctx.fill();
    }

  } else if (s.diet >= 0.65) {
    // ===== PAC-MAN CHOMPER =====
    // Two thick half-disc jaw halves, high contrast, bold teeth.
    // Immediately reads as "predator". Idle: subtle breathing.
    const ms = g.mouthScale;
    const hingeX = mouthX - 1 * ms;
    const jawLen = mw + 2 * ms;           // protrusion from body edge
    const jawSpan = mh * 0.85 + 4 * ms;  // outer extent from centerline (half total height)
    const baseGap = (2 + mh * 0.1) * ms;   // resting mouth-opening half-width
    const idleGap = Math.sin(t * 1.8) * mh * 0.04;
    // Hinge barely moves; eating opens at the TIP (right side)
    const jawGap = Math.max(1.5, baseGap + idleGap + openFactor * jawSpan * 0.06);
    const tipEat = openFactor * jawSpan * 0.55; // eating spread at tip

    // Tip shape: tapers at rest, spreads wide when eating
